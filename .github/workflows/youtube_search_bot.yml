async function handleStart(chatId) {
  log(`👋 پیام /start از ${chatId}`);
  const welcome = '👋 سلام! من ربات جستجوی یوتیوب هستم.\n🔍 هر عبارتی که می‌خواهید جستجو کنید را برایم بفرستید تا ۲۰ نتیجهٔ برتر را با عکس و اطلاعات کامل برایتان ارسال کنم.\n\nاز دکمه‌های زیر هم می‌توانید استفاده کنید.';
