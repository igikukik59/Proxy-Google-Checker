name: 🔍 ربات جستجوی همه‌کارهٔ یوتیوب (نسخهٔ نهایی سریع)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'    # هر ۶ ساعت (نیم ساعت استراحت)

jobs:
  search-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    permissions:
      contents: write
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🧰 نصب پیش‌نیازها (yt-dlp, deno, ffmpeg, xray)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y curl unzip python3-pip ffmpeg
          pip install yt-dlp
          # نصب deno برای رفع هشدار JavaScript challenge
          curl -fsSL https://deno.land/install.sh | sh
          echo "${HOME}/.deno/bin" >> $GITHUB_PATH
          # نصب Xray-core
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d xray && chmod +x xray/xray

      - name: 🔍 اجرای ربات جستجوگر
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_SEARCH_BOT_TOKEN }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          cat > search_bot.cjs << 'ENDSCRIPT'
          // ═══════════════════════════════════════════════════════════
          //  ربات جستجوی همه‌کارهٔ یوتیوب - نسخهٔ نهایی ۴
          //  ارسال سریع‌تر با Fallback متنی و تصاویر سبک‌تر
          // ═══════════════════════════════════════════════════════════
          const { spawn, execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');

          const PROXY_FILE = 'کانفیگ های خوب.txt';
          const LOG_FILE = 'search_bot_log.txt';
          const TOKEN = process.env.RUBIKA_BOT_TOKEN;
          const ADMIN_SECRET = process.env.ADMIN_SECRET || '';
          if (!TOKEN) { console.error('❌ توکن ربات تنظیم نشده'); process.exit(1); }

          const MAX_RESULTS = 20;
          const MAX_QUEUE = 200;
          const SEARCH_TIMEOUT = 180000;          // ۳ دقیقه
          const DAILY_SEARCH_LIMIT = 30;
          const MAX_BUFFER = 20 * 1024 * 1024;    // ۲۰ مگابایت

          let proxies = [];
          let currentProxy = null;
          let xrayProc = null;

          // ══════════════ ابزارهای پایه ══════════════
          function ts() { return new Date().toISOString().replace('T',' ').substring(0,19); }
          function log(...args) {
            const msg = `[${ts()}] ${args.join(' ')}`;
            console.log(msg);
            try { fs.appendFileSync(LOG_FILE, msg + '\n'); } catch(_) {}
          }
          function logError(...args) {
            const msg = `[${ts()}] ❌ ${args.join(' ')}`;
            console.error(msg);
            try { fs.appendFileSync(LOG_FILE, msg + '\n'); } catch(_) {}
          }
          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // ══════════════ مدیریت پروکسی Xray ══════════════
          function parseURI(uri) {
            try {
              const u = new URL(uri);
              return {
                protocol: u.protocol.replace(':',''),
                uuid: u.username,
                address: u.hostname,
                port: u.port,
                params: Object.fromEntries(u.searchParams.entries())
              };
            } catch(_) { return null; }
          }
          function generateXrayConfig(uri) {
            const p = parseURI(uri); if (!p) return null;
            const inbound = { port: 10808, protocol: 'socks', settings: { auth: 'noauth', udp: true } };
            let outbound = { protocol: p.protocol, streamSettings: { network: p.params.type || 'tcp' } };
            if (p.protocol === 'trojan') outbound.settings = { servers: [{ address: p.address, port: parseInt(p.port), password: p.uuid }] };
            else outbound.settings = { vnext: [{ address: p.address, port: parseInt(p.port), users: [{ id: p.uuid, encryption: p.params.encryption || 'none', flow: p.params.flow || '' }] }] };
            const net = p.params.type || 'tcp'; outbound.streamSettings.network = net;
            if (net === 'ws') outbound.streamSettings.wsSettings = { path: p.params.path || '/', headers: p.params.host ? { Host: p.params.host } : {} };
            const sec = p.params.security || 'none';
            if (sec === 'tls' || sec === 'reality') {
              outbound.streamSettings.security = sec;
              const tls = { serverName: p.params.sni || p.address };
              if (sec === 'reality') { tls.fingerprint = p.params.fp || 'chrome'; tls.publicKey = p.params.pbk || ''; tls.shortId = p.params.sid || ''; tls.spiderX = ''; }
              if (p.params.allowInsecure === '1') tls.allowInsecure = true;
              if (p.params.alpn) tls.alpn = p.params.alpn.split(',');
              outbound.streamSettings.tlsSettings = tls;
            } else outbound.streamSettings.security = 'none';
            return { inbounds: [inbound], outbounds: [outbound] };
          }
          async function startXray(uri, idx) {
            const config = generateXrayConfig(uri); if (!config) return null;
            const cfgPath = `/tmp/xray_search_${idx}.json`;
            fs.writeFileSync(cfgPath, JSON.stringify(config, null, 2));
            const proc = spawn(path.join('.', 'xray', 'xray'), ['run','-config', cfgPath], { stdio:'pipe' });
            await sleep(4000);
            return proc;
          }
          function testProxyConnection() {
            try {
              execSync('curl --socks5 127.0.0.1:10808 --max-time 8 -s http://ip-api.com/json', { encoding:'utf8', stdio:'pipe' });
              return true;
            } catch(e) { logError('تست اتصال پروکسی شکست:', e.message); return false; }
          }
          async function switchToRandomProxy() {
            log('🔄 تعویض پروکسی...');
            if (xrayProc) { xrayProc.kill(); await sleep(500); xrayProc = null; }
            currentProxy = null;
            if (!proxies.length) { logError('پروکسی موجود نیست'); return false; }
            for (let i=0; i<Math.min(proxies.length,5); i++) {
              const candidate = proxies[Math.floor(Math.random()*proxies.length)];
              log(`🔀 امتحان #${i+1}: ${candidate.substring(0,60)}...`);
              xrayProc = await startXray(candidate, Date.now());
              await sleep(4000);
              if (testProxyConnection()) {
                currentProxy = candidate;
                log('✅ پروکسی جدید برقرار شد');
                return true;
              }
              if (xrayProc) { xrayProc.kill(); await sleep(500); xrayProc = null; }
            }
            logError('❌ هیچ پروکسی سالمی یافت نشد');
            return false;
          }

          // ══════════════ Rubika API ══════════════
          const BASE = `https://botapi.rubika.ir/v3/${TOKEN}`;
          async function api(method, body={}, retries=5) {
            const url = `${BASE}/${method}`;
            for (let a=0; a<retries; a++) {
              try {
                const ctrl = new AbortController(); const id = setTimeout(()=>ctrl.abort(),30000);
                const res = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:ctrl.signal});
                clearTimeout(id);
                const t = await res.text();
                if (t.startsWith('<!DOCTYPE html>') || t.includes('nginx')) {
                  log(`⚠️ پاسخ HTML (تلاش ${a+1})، صبر ${1<<a}s`);
                  await sleep((1<<a)*1000);
                  continue;
                }
                let d; try { d = JSON.parse(t); } catch(_) {
                  if (a<retries-1) { await sleep(2000*(a+1)); continue; }
                  logError('پاسخ JSON نامعتبر:', t.substring(0,200));
                  return {error:true, raw:t};
                }
                if (d.error) logError(`خطای API در ${method}:`, JSON.stringify(d).substring(0,200));
                return d;
              } catch(e) {
                if (a<retries-1) { await sleep(2000*(a+1)); continue; }
                logError(`خطای fetch در ${method}:`, e.message);
                return {error:true, message:e.message};
              }
            }
            return {error:true, message:'بعد از ۵ تلاش ناموفق'};
          }
          async function sendMessage(chatId, text, keypad=null) {
            log(`📤 پیام به ${chatId}: "${text.substring(0,80)}${text.length>80?'…':''}"`);
            const body = { chat_id: chatId, text };
            if (keypad) { body.chat_keypad = keypad; body.chat_keypad_type = 'New'; }
            const res = await api('sendMessage', body);
            if (res.error) logError(`ارسال پیام به ${chatId} شکست خورد`);
            else log(`✅ پیام به ${chatId} ارسال شد`);
            return res;
          }
          // آپلود عکس با فقط یک بار تلاش؛ در صورت شکست، false برمی‌گرداند
          async function uploadAndSendImage(chatId, imagePath, caption='') {
            log(`🖼️ آپلود عکس ${path.basename(imagePath)} برای ${chatId}`);
            const start = Date.now();
            const req = await api('requestSendFile', {type:'Image'});
            const upUrl = req?.data?.upload_url;
            if (!upUrl) { logError('upload_url نگرفت'); return false; }
            const buf = fs.readFileSync(imagePath);
            const form = new FormData();
            form.append('file', new Blob([buf],{type:'application/octet-stream'}), path.basename(imagePath));
            const upRes = await fetch(upUrl, {method:'POST', body:form});
            const upText = await upRes.text();
            let j = {}; try { j = JSON.parse(upText); } catch(_) {}
            const fileId = j?.file_id || j?.data?.file_id;
            if (!fileId) {
              logError(`file_id عکس پیدا نشد. پاسخ: ${upText.substring(0,200)}`);
              return false;
            }
            const s = await api('sendFile', {chat_id:chatId, file_id:fileId, text:caption});
            const elapsed = ((Date.now()-start)/1000).toFixed(1);
            if (s.error) {
              logError(`ارسال عکس در api('sendFile') شکست خورد`);
              return false;
            }
            log(`✅ عکس ارسال شد (${elapsed}s)`);
            return true;
          }

          // ══════════════ اجرای yt-dlp با spawn ══════════════
          async function executeYtDlp(args) {
            if (!currentProxy) throw new Error('پروکسی فعال نیست');
            args.unshift('--js-runtimes', 'deno');
            log(`🛠️ اجرای yt-dlp: yt-dlp ${args.join(' ')}`);
            const startTime = Date.now();
            return new Promise((resolve, reject) => {
              const proc = spawn('yt-dlp', args, {
                stdio: ['ignore', 'pipe', 'pipe'],
                env: { ...process.env, PYTHONUNBUFFERED: '1' }
              });
              let stdout = '', stderr = '';
              proc.stdout.on('data', (data) => {
                stdout += data.toString();
                if (stdout.length > MAX_BUFFER) {
                  proc.kill();
                  reject(new Error('حجم خروجی بیش از حد'));
                }
              });
              proc.stderr.on('data', (data) => {
                stderr += data.toString();
                const line = data.toString().trim();
                if (!line.startsWith('WARNING:') && line.length>0) {
                  log(`⚠️ stderr: ${line.substring(0,200)}`);
                }
              });
              proc.on('close', (code) => {
                const elapsed = ((Date.now()-startTime)/1000).toFixed(1);
                log(`⏱️ yt-dlp پایان یافت (کد ${code}) در ${elapsed}s`);
                if (code !== 0 && stdout.length === 0) {
                  logError('yt-dlp بدون خروجی با خطا بسته شد. stderr:', stderr.substring(0,500));
                  reject(new Error(`yt-dlp exit code ${code}`));
                  return;
                }
                const lines = stdout.split('\n').filter(l => l.trim().startsWith('{'));
                const results = [];
                for (const line of lines) {
                  try {
                    const data = JSON.parse(line);
                    if (data.webpage_url || data.url) {
                      let channelLink = data.channel_url || '';
                      if (!channelLink && data.uploader_id) {
                        channelLink = `https://www.youtube.com/@${data.uploader_id}`;
                      } else if (!channelLink && data.channel_id) {
                        channelLink = `https://www.youtube.com/channel/${data.channel_id}`;
                      }
                      // جایگزینی thumbnail با نسخهٔ hqdefault برای حجم کمتر
                      const thumb = (data.thumbnail || '').replace(/maxresdefault\.jpg$/i, 'hqdefault.jpg');
                      results.push({
                        title: data.title,
                        url: data.webpage_url || data.url,
                        thumbnail: thumb,
                        duration: data.duration,
                        view_count: data.view_count,
                        upload_date: data.upload_date,
                        uploader: data.uploader || data.channel || 'نامشخص',
                        channel_url: channelLink
                      });
                    }
                  } catch(e) { logError('تجزیه JSON شکست:', e.message); }
                  if (results.length >= MAX_RESULTS) break;
                }
                log(`📊 تعداد نتایج: ${results.length}`);
                resolve(results);
              });
              proc.on('error', (err) => reject(err));
              setTimeout(() => { proc.kill(); reject(new Error('yt-dlp timeout')); }, SEARCH_TIMEOUT);
            });
          }

          // ══════════════ دانلود عکس با curl ══════════════
          async function downloadThumbnail(url, idx) {
            const outPath = `/tmp/thumb_${idx}.jpg`;
            log(`⬇️ دانلود عکس ${idx}: ${url}`);
            try {
              execSync(`curl --socks5-hostname 127.0.0.1:10808 -sL --max-time 15 -o "${outPath}" "${url}"`, {stdio:'pipe', timeout:20000});
              if (fs.existsSync(outPath) && fs.statSync(outPath).size > 0) {
                log(`✅ عکس ${idx} دانلود شد (${(fs.statSync(outPath).size/1024).toFixed(1)}KB)`);
                return outPath;
              }
              logError(`عکس ${idx} خالی یا صفر بایت`);
              return null;
            } catch(e) { logError(`دانلود عکس ${idx} شکست:`, e.message); return null; }
          }

          // ══════════════ ابزارهای فرمت ══════════════
          function formatDuration(seconds) {
            if (!seconds) return '?';
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60).toString().padStart(2,'0');
            return `${min}:${sec}`;
          }
          function formatViews(count) {
            if (!count || count < 0) return '0';
            if (count >= 1e9) return (count/1e9).toFixed(1) + 'B';
            if (count >= 1e6) return (count/1e6).toFixed(1) + 'M';
            if (count >= 1000) return (count/1e3).toFixed(1) + 'K';
            return count.toString();
          }
          function formatDate(dateStr) {
            if (!dateStr || dateStr.length !== 8) return 'نامشخص';
            return `${dateStr.substring(6,8)}/${dateStr.substring(4,6)}/${dateStr.substring(0,4)}`;
          }

          // ══════════════ صف و پردازش ══════════════
          const queue = [];
          let isProcessing = false;
          const userDailyMap = new Map();
          const adminUsers = new Set();

          const mainKeypad = {
            rows: [{ buttons: [
              { id:'QUEUE_STATUS', type:'Simple', button_text:'⏳ وضعیت صف' },
              { id:'HELP', type:'Simple', button_text:'❓ راهنما' }
            ]}],
            resize_keyboard: true, one_time_keyboard: false
          };

          async function processNext() {
            log(`🔄 صف: ${queue.length} | پردازش: ${isProcessing}`);
            if (!queue.length) { isProcessing = false; log('⏸️ صف خالی'); return; }
            isProcessing = true;
            const n = queue.shift();
            await sendMessage(n.chatId, '🔜 نوبت شما رسید...');
            await processRequest(n.chatId, n.input);
          }

          async function sendVideoResult(chatId, video, idx) {
            const durationStr = formatDuration(video.duration);
            const viewStr = formatViews(video.view_count);
            const dateStr = formatDate(video.upload_date);
            const uploader = video.uploader || 'نامشخص';
            let channelLine = `📺 ${uploader}`;
            if (video.channel_url) {
              channelLine += `\n🔹 ${video.channel_url}`;
            }
            const caption = `🎬 ${video.title}\n⏱ ${durationStr}  |  👁 ${viewStr}  |  📅 ${dateStr}\n${channelLine}\n🔗 ${video.url}`;

            // تلاش برای ارسال عکس فقط یک بار
            const thumbPath = await downloadThumbnail(video.thumbnail, idx);
            let imageSent = false;
            if (thumbPath) {
              imageSent = await uploadAndSendImage(chatId, thumbPath, caption);
              try { fs.unlinkSync(thumbPath); } catch(_) {}
            }
            // اگر عکس فرستاده نشد، متن را بفرست
            if (!imageSent) {
              log(`⚠️ ارسال متن به‌جای عکس برای نتیجه ${idx+1}`);
              await sendMessage(chatId, caption);
            }
            await sleep(600); // تنفس ۶۰۰ میلی‌ثانیه
          }

          async function processRequest(chatId, input) {
            log(`📥 پردازش ورودی ${chatId}: "${input}"`);
            let args = [];
            let mode = 'search';
            let query = input;

            // تشخیص نوع ورودی
            if (/^@[\w.-]+$/.test(input)) {
              query = `https://www.youtube.com/${input}`;
              mode = 'channel';
            } else if (/https?:\/\/(www\.)?youtube\.com\/(@|channel\/|c\/)/i.test(input)) {
              mode = 'channel';
            } else if (/https?:\/\/(www\.)?youtube\.com\/playlist\?list=/i.test(input)) {
              mode = 'playlist';
            } else if (/youtube\.com\/watch\?v=|youtu\.be\//i.test(input)) {
              mode = 'single';
            } else {
              query = `ytsearch${MAX_RESULTS}:${input}`;
            }

            try {
              if (mode === 'single') {
                args = ['--dump-json', '--socket-timeout','30','-R','2','--proxy','socks5h://127.0.0.1:10808', query];
                const results = await executeYtDlp(args);
                if (results.length === 0) {
                  await sendMessage(chatId, '⚠️ اطلاعات ویدیو دریافت نشد.');
                  return;
                }
                await sendMessage(chatId, '🎬 اطلاعات ویدیو:');
                await sendVideoResult(chatId, results[0], 0);
                await sendMessage(chatId, '✅ دریافت شد.');
              } else {
                const commonArgs = ['--no-flat-playlist','--dump-json','--socket-timeout','30','-R','2','--proxy','socks5h://127.0.0.1:10808'];
                if (mode === 'channel' || mode === 'playlist') {
                  args = [...commonArgs, '--playlist-end', String(MAX_RESULTS), query];
                } else {
                  args = [...commonArgs, query]; // ytsearch20:...
                }
                const results = await executeYtDlp(args);
                if (results.length === 0) {
                  await sendMessage(chatId, '⚠️ هیچ ویدیویی یافت نشد.');
                  return;
                }
                await sendMessage(chatId, `📊 ${results.length} نتیجه یافت شد. در حال ارسال...`);
                for (let i=0; i<results.length; i++) {
                  log(`🖼️ ارسال ${i+1}/${results.length} - ${results[i]?.title?.substring(0,60)}`);
                  await sendVideoResult(chatId, results[i], i);
                }
                await sendMessage(chatId, '✅ عملیات با موفقیت انجام شد.');
              }
            } catch(e) {
              logError(`خطا در پردازش:`, e.message);
              await sendMessage(chatId, '❌ متأسفانه مشکلی پیش آمد. لطفاً دوباره تلاش کنید.');
            } finally {
              processNext();
            }
          }

          function addToQueue(chatId, input) {
            const isAdmin = adminUsers.has(chatId);
            if (!isAdmin) {
              const used = userDailyMap.get(chatId) || 0;
              if (used >= DAILY_SEARCH_LIMIT) {
                sendMessage(chatId, `⛔ سقف ${DAILY_SEARCH_LIMIT} جستجو پر شد.`);
                return;
              }
              userDailyMap.set(chatId, used+1);
            }
            if (queue.length >= MAX_QUEUE && !isAdmin) {
              sendMessage(chatId, '⚠️ صف پر است، بعداً تلاش کنید.');
              return;
            }
            if (!isProcessing) {
              isProcessing = true;
              processRequest(chatId, input);
              return;
            }
            if (queue.some(i => i.chatId === chatId)) {
              sendMessage(chatId, '⚠️ شما قبلاً یک درخواست در صف دارید.');
              return;
            }
            queue.push({ chatId, input });
            const pos = queue.length;
            const estMin = Math.ceil((pos * 10) / 60); // تخمین سریع‌تر
            sendMessage(chatId, `📍 نفر ${pos}ام در صف؛ حدود ${estMin} دقیقه دیگر.`, mainKeypad);
          }

          // ══════════════ دکمه‌ها و پیام‌ها ══════════════
          async function handleQueueStatus(chatId) {
            const idx = queue.findIndex(i => i.chatId === chatId);
            if (idx === -1) return sendMessage(chatId, 'ℹ️ درخواست فعالی ندارید.');
            const estSec = (idx+1)*10;
            const estMin = Math.floor(estSec/60);
            sendMessage(chatId, `📍 موقعیت: ${idx+1} | ⏳ حدود ${estMin} دقیقه`);
          }
          async function handleHelp(chatId) {
            const help = '🔍 ربات جستجوی همه‌کارهٔ یوتیوب\n\n'
              + '🔹 ارسال یک عبارت → ۲۰ ویدیوی برتر\n'
              + '🔹 ارسال @Handle → آخرین ۲۰ ویدیوی کانال\n'
              + '🔹 لینک پلی‌لیست → ۲۰ ویدیوی اول\n'
              + '🔹 لینک ویدیو → اطلاعات کامل ویدیو\n\n'
              + `⚠️ محدودیت: هر کاربر ${DAILY_SEARCH_LIMIT} جستجو در هر ۶ ساعت`;
            await sendMessage(chatId, help, mainKeypad);
          }
          async function handleStart(chatId) {
            await sendMessage(chatId, '👋 سلام! من دستیار جستجوی یوتیوب هستم.\nهر چیزی جستجو کنی (عبارت، کانال، پلی‌لیست یا لینک ویدیو) برات می‌فرستم.', mainKeypad);
          }

          // ══════════════ حلقهٔ اصلی ══════════════
          (async () => {
            log('🚀 شروع ربات');
            const me = await api('getMe');
            if (!me?.data?.bot?.username) { logError('توکن نامعتبر'); process.exit(1); }
            log(`✅ @${me.data.bot.username}`);

            if (!fs.existsSync(PROXY_FILE)) { logError('فایل پروکسی نیست'); process.exit(1); }
            proxies = fs.readFileSync(PROXY_FILE,'utf8').split('\n').map(l=>l.trim()).filter(l=>/^(vless|trojan|ss|vmess):\/\//.test(l));
            if (!proxies.length) { logError('پروکسی معتبر نداریم'); process.exit(1); }
            log(`📋 ${proxies.length} پروکسی`);

            if (!(await switchToRandomProxy())) { logError('اتصال اولیه شکست'); process.exit(1); }

            log('🧹 پاکسازی تاریخچه...');
            let offset = null;
            while (true) {
              const res = await api('getUpdates',{limit:100,offset_id:offset});
              if (!res?.data?.updates?.length) break;
              offset = res.data.next_offset_id;
              if (!offset) break;
            }

            const DEADLINE = Date.now() + 19740*1000; // ۵.۵ ساعت
            log(`⏳ زمان پایان: ${new Date(DEADLINE).toISOString()}`);

            while (Date.now() < DEADLINE) {
              try {
                const res = await api('getUpdates',{limit:10,offset_id:offset});
                if (res.error) { await sleep(5000); continue; }
                const updates = res?.data?.updates;
                if (!updates?.length) { await sleep(4000); continue; }

                for (const u of updates) {
                  if (u.type !== 'NewMessage') continue;
                  const chatId = u.chat_id;
                  const msg = u.new_message;
                  const buttonId = msg.aux_data?.button_id;

                  if (buttonId === 'QUEUE_STATUS') { await handleQueueStatus(chatId); continue; }
                  if (buttonId === 'HELP') { await handleHelp(chatId); continue; }

                  if (!msg?.text) continue;
                  const text = msg.text.trim();
                  log(`💬 از ${chatId}: "${text}"`);

                  if (ADMIN_SECRET && text === ADMIN_SECRET) {
                    adminUsers.add(chatId);
                    await sendMessage(chatId, '🔑 ادمین شدید. بدون محدودیت.');
                    continue;
                  }
                  if (text === '/start' || text.toLowerCase() === 'start') { await handleStart(chatId); continue; }
                  if (text === '/help' || text.toLowerCase() === 'help') { await handleHelp(chatId); continue; }

                  addToQueue(chatId, text);
                }

                if (res.data?.next_offset_id) offset = res.data.next_offset_id;
              } catch(e) { logError('حلقه اصلی:', e.message); await sleep(5000); }
            }

            log('⏹️ خاموشی');
            if (xrayProc) xrayProc.kill();
          })();
          ENDSCRIPT

          timeout 19740 node search_bot.cjs
