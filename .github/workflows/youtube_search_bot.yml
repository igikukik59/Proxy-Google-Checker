// ======================== حلقه اصلی ========================
(async () => {
  log('🚀 راه‌اندازی ربات جستجوی یوتیوب');

  const me = await api('getMe');
  if (!me?.data?.bot?.username) {
    logError('توکن نامعتبر است یا ربات یافت نشد');
    process.exit(1);
  }
  log(`✅ ربات: @${me.data.bot.username}`);

  // خواندن پروکسی‌ها
  if (!fs.existsSync(PROXY_FILE)) {
    logError(`فایل ${PROXY_FILE} یافت نشد`);
    process.exit(1);
  }
  proxies = fs.readFileSync(PROXY_FILE, 'utf8').split('\n').map(l => l.trim()).filter(l => /^(vless|trojan|ss|vmess):\/\//.test(l));
  if (proxies.length === 0) {
    logError('هیچ پروکسی معتبری در فایل نیست');
    process.exit(1);
  }
  log(`📋 ${proxies.length} پروکسی بارگذاری شد`);

  if (!(await switchToRandomProxy())) {
    logError('اتصال اولیه با هیچ پروکسی ممکن نشد');
    process.exit(1);
  }

  // پاک‌سازی پیام‌های قدیمی
  log('🧹 پاکسازی پیام‌های قدیمی از روبیکا...');
  let offset = null;
  while (true) {
    const res = await api('getUpdates', { limit: 100, offset_id: offset });
    const updates = res?.data?.updates;
    if (!updates || updates.length === 0) break;
    offset = res.data.next_offset_id;
    if (!offset) break;
  }
  log('✅ تاریخچه پاک شد');

  const DEADLINE_END = Date.now() + 19740 * 1000; // ۵ ساعت و ۲۹ دقیقه
  log(`⏳ زمان پایان ربات: ${new Date(DEADLINE_END).toISOString()}`);

  while (Date.now() < DEADLINE_END) {
    try {
      const res = await api('getUpdates', { limit: 10, offset_id: offset });
      if (res.error) {
        logError('خطا در getUpdates:', res.message || res.raw);
        await sleep(5000);
        continue;
      }
      const updates = res?.data?.updates;
      if (!updates || updates.length === 0) {
        await sleep(4000);
        continue;
      }

      for (const u of updates) {
        log(`📨 به‌روزرسانی: chat=${u.chat_id}, type=${u.type}, message_id=${u.message_id}`);

        if (u.type !== 'NewMessage') continue;

        const chatId = u.chat_id;
        const msg = u.new_message;
        const buttonId = msg.aux_data?.button_id;

        // --- دکمه‌ها ---
        if (buttonId === 'QUEUE_STATUS') {
          log(`🔘 دکمه وضعیت صف از ${chatId}`);
          await handleQueueStatus(chatId);
          continue;
        }
        if (buttonId === 'HELP') {
          log(`🔘 دکمه راهنما از ${chatId}`);
          await handleHelp(chatId);
          continue;
        }

        if (!msg?.text) continue;
        const text = msg.text.trim();
        log(`💬 پیام متنی از ${chatId}: "${text}"`);

        // --- دستور ادمین ---
        if (ADMIN_SECRET && text === ADMIN_SECRET) {
          adminUsers.add(chatId);
          log(`🔑 کاربر ${chatId} ادمین شد`);
          await sendMessage(chatId, '🔑 حالت ادمین فعال شد. دیگر محدودیت جستجو ندارید.');
          continue;
        }

        // --- دستور /start یا start ---
        if (text === '/start' || text.toLowerCase() === 'start') {
          await handleStart(chatId);
          continue;
        }

        // --- دستور /help یا help ---
        if (text === '/help' || text.toLowerCase() === 'help') {
          await handleHelp(chatId);
          continue;
        }

        // --- لینک یوتیوب (نادیده بگیر با یک پیام راهنما) ---
        if (/youtube\.com\/watch|youtu\.be\//.test(text)) {
          log(`🔗 لینک یوتیوب دریافت شد از ${chatId} - نادیده گرفته شد`);
          await sendMessage(chatId, '⚠️ این ربات فقط جستجو می‌کند. لینک را به ربات دانلودر بفرستید.');
          continue;
        }

        // --- در غیر این صورت، عبارت جستجو ---
        log(`🔎 عبارت جستجو: "${text}"`);
        addToQueue(chatId, text);
      }

      if (res.data?.next_offset_id) offset = res.data.next_offset_id;
    } catch (e) {
      logError('خطا در حلقه اصلی:', e.message);
      await sleep(5000);
    }
  }

  // پایان
  log('⏹️ زمان ربات به پایان رسید. خاموش شدن...');
  if (xrayProc) {
    xrayProc.kill();
    log('🛑 پروکسی قطع شد');
  }
  log('👋 ربات جستجو خاموش شد');
})();
