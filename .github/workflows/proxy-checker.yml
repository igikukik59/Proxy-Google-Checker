name: 🖥️ Hardware Info

on:
  workflow_dispatch:  # دستی اجرا کنید

jobs:
  gather-info:
    runs-on: ubuntu-latest
    steps:
      - name: 📋 جمع‌آوری اطلاعات سخت‌افزاری
        run: |
          echo "============================================"
          echo "   🏷️  اطلاعات سیستم‌عامل"
          echo "============================================"
          cat /etc/os-release 2>/dev/null || cat /etc/*release 2>/dev/null
          echo ""
          uname -a

          echo ""
          echo "============================================"
          echo "   🧠 پردازنده (CPU)"
          echo "============================================"
          lscpu
          echo ""
          echo "مدل CPU:"
          cat /proc/cpuinfo | grep "model name" | head -1
          echo "تعداد هسته‌ها: $(nproc)"

          echo ""
          echo "============================================"
          echo "   🧮 حافظه (RAM)"
          echo "============================================"
          free -h
          echo ""
          echo "جزئیات از /proc/meminfo:"
          cat /proc/meminfo | grep -E "MemTotal|MemFree|SwapTotal" | head -3

          echo ""
          echo "============================================"
          echo "   💾 دیسک (Disk)"
          echo "============================================"
          df -h /
          echo ""
          lsblk -o NAME,SIZE,TYPE,MOUNTPOINT 2>/dev/null

          echo ""
          echo "============================================"
          echo "   📊 گزارش خلاصه (JSON)"
          echo "============================================"
          CPU_MODEL=$(cat /proc/cpuinfo | grep "model name" | head -1 | cut -d ':' -f2 | xargs)
          CORES=$(nproc)
          MEM_TOTAL=$(free -h | awk '/^Mem:/{print $2}')
          DISK_TOTAL=$(df -h / | awk 'NR==2{print $2}')
          DISK_AVAIL=$(df -h / | awk 'NR==2{print $4}')
          OS=$(cat /etc/os-release | grep PRETTY_NAME | cut -d '"' -f2)

          JSON="{\"os\":\"$OS\", \"cpu\":\"$CPU_MODEL\", \"cores\":$CORES, \"memory\":\"$MEM_TOTAL\", \"disk_total\":\"$DISK_TOTAL\", \"disk_avail\":\"$DISK_AVAIL\"}"
          echo "$JSON"

          # ذخیره در فایل برای استفاده در گام بعدی
          echo "$JSON" > /tmp/hwinfo.json

      - name: 📤 ارسال به روبیکا (اختیاری)
        env:
          TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.RUBIKA_OWNER_CHAT_ID }}
        if: env.TOKEN != '' && env.CHAT_ID != ''
        run: |
          HW=$(cat /tmp/hwinfo.json)
          MESSAGE="🖥️ مشخصات سرور گیت‌هاب امروز:"
          MESSAGE+="\nسیستم‌عامل: $(echo $HW | jq -r '.os')"
          MESSAGE+="\nپردازنده: $(echo $HW | jq -r '.cpu')"
          MESSAGE+="\nتعداد هسته: $(echo $HW | jq -r '.cores')"
          MESSAGE+="\nحافظه: $(echo $HW | jq -r '.memory')"
          MESSAGE+="\nدیسک کل: $(echo $HW | jq -r '.disk_total')"
          MESSAGE+="\nدیسک آزاد: $(echo $HW | jq -r '.disk_avail')"

          curl -s -X POST "https://botapi.rubika.ir/v3/${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\", \"text\":\"$MESSAGE\"}"
