name: 🌐 مرورگر راه دور (دانلود ویدیو + اسکرول چندگانه + زوم)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  remote-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🧰 نصب ابزارها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y curl unzip python3-pip
          pip install yt-dlp
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d xray && chmod +x xray/xray
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: 🤖 اجرای ربات (نسخه نهایی)
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          RUBIKA_OWNER_CHAT_ID: ${{ secrets.RUBIKA_OWNER_CHAT_ID }}
        run: |
          cat > agent.cjs << 'ENDSCRIPT'
          const { spawn, execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());

          const PROXY_FILE = 'کانفیگ های خوب.txt';
          const TARGET_URL = 'https://console.groq.com/playground';

          function ts() { return new Date().toISOString().replace('T',' ').substring(0,19); }
          function log(...args) { console.log(`[${ts()}]`, ...args); }
          function err(...args) { console.error(`[${ts()}] ❌`, ...args); }
          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // ======================== Xray Helpers ========================
          function parseURI(uri) {
            try {
              const u = new URL(uri);
              return {
                protocol: u.protocol.replace(':',''),
                uuid: u.username,
                address: u.hostname,
                port: u.port,
                params: Object.fromEntries(u.searchParams.entries())
              };
            } catch(e) { return null; }
          }

          function generateXrayConfig(uri) {
            const p = parseURI(uri);
            if (!p) return null;
            const inbound = { port: 10808, protocol: 'socks', settings: { auth: 'noauth', udp: true } };
            let outbound = {
              protocol: p.protocol,
              settings: p.protocol === 'trojan' ? {
                servers: [{ address: p.address, port: parseInt(p.port), password: p.uuid }]
              } : {
                vnext: [{ address: p.address, port: parseInt(p.port), users: [{ id: p.uuid, encryption: p.params.encryption || 'none', flow: p.params.flow || '' }] }]
              },
              streamSettings: { network: p.params.type || 'tcp' }
            };
            const network = p.params.type || 'tcp';
            outbound.streamSettings.network = network;
            if (network === 'ws') {
              outbound.streamSettings.wsSettings = {
                path: p.params.path || '/',
                headers: p.params.host ? { Host: p.params.host } : {}
              };
            }
            const security = p.params.security || 'none';
            if (security === 'tls' || security === 'reality') {
              outbound.streamSettings.security = security;
              const tls = { serverName: p.params.sni || p.address };
              if (security === 'reality') {
                tls.fingerprint = p.params.fp || 'chrome';
                tls.publicKey = p.params.pbk || '';
                tls.shortId = p.params.sid || '';
                tls.spiderX = '';
              }
              if (p.params.allowInsecure === '1') tls.allowInsecure = true;
              if (p.params.alpn) tls.alpn = p.params.alpn.split(',');
              outbound.streamSettings.tlsSettings = tls;
            } else {
              outbound.streamSettings.security = 'none';
            }
            return { inbounds: [inbound], outbounds: [outbound] };
          }

          async function startXray(uri, idx) {
            const config = generateXrayConfig(uri);
            if (!config) return null;
            const cfgPath = `/tmp/xray_${idx}.json`;
            fs.writeFileSync(cfgPath, JSON.stringify(config, null, 2));
            const xray = spawn(path.join(process.cwd(), 'xray', 'xray'), ['run', '-config', cfgPath], { stdio: 'pipe' });
            await new Promise(r => setTimeout(r, 4000));
            return xray;
          }

          function testCurl(port) {
            try {
              execSync(`curl --socks5 127.0.0.1:${port} --max-time 5 -s http://ip-api.com/json`, { encoding: 'utf8' });
              return true;
            } catch(e) { return false; }
          }

          // ======================== Rubika API ========================
          const TOKEN = process.env.RUBIKA_BOT_TOKEN;
          const OWNER = process.env.RUBIKA_OWNER_CHAT_ID || '';
          const BASE = `https://botapi.rubika.ir/v3/${TOKEN}`;

          async function api(method, body = {}) {
            const url = `${BASE}/${method}`;
            try {
              const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(body)
              });
              const text = await res.text();
              let data;
              try { data = JSON.parse(text); } catch(e) {
                err(`⚠️ پاسخ ${method} JSON نیست:`, text.substring(0, 300));
                return { error: true, raw: text };
              }
              return data;
            } catch(e) {
              err(`🚨 خطای شبکه در ${method}:`, e.message);
              return { error: true, message: e.message };
            }
          }

          async function sendMessage(chatId, text, extra = {}) {
            return await api('sendMessage', { chat_id: chatId, text, ...extra });
          }

          async function deleteMessage(chatId, messageId) {
            if (!messageId) return;
            return await api('deleteMessage', { chat_id: chatId, message_id: messageId });
          }

          async function uploadAndSendFile(chatId, filePath, fileType, keypad = null) {
            const reqRes = await api('requestSendFile', { type: fileType });
            const uploadUrl = reqRes?.data?.upload_url;
            if (!uploadUrl) { err('upload_url دریافت نشد'); return null; }

            const buf = fs.readFileSync(filePath);
            const form = new FormData();
            form.append('file', new Blob([buf], { type: 'application/octet-stream' }), path.basename(filePath));

            const upRes = await fetch(uploadUrl, { method: 'POST', body: form });
            const upText = await upRes.text();
            let upJson = {};
            try { upJson = JSON.parse(upText); } catch(e) {}
            const fileId = upJson?.file_id || upJson?.data?.file_id;
            if (!fileId) { err('file_id یافت نشد'); return null; }

            const sendBody = { chat_id: chatId, file_id: fileId, text: '' };
            if (keypad) {
              sendBody.chat_keypad = keypad;
              sendBody.chat_keypad_type = 'New';
            }
            const sendRes = await api('sendFile', sendBody);
            return sendRes?.data?.message_id || null;
          }

          // ======================== انتخاب هوشمند با شماره (پیشرفته: Shadow DOM و iframe) ========================
          async function highlightClickableElements(page) {
            return await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-sel-id]').forEach(el => el.removeAttribute('data-rubika-sel-id'));

              const baseSelectors = [
                'a', 'button', 'input', 'select', 'textarea', 'area', 'summary', 'details', 'label',
                '[onclick]',
                '[role="button"]', '[role="menuitem"]', '[role="option"]', '[role="tab"]',
                '[role="link"]', '[role="listbox"]', '[role="combobox"]', '[role="menu"]',
                '[role="menubar"]', '[role="treeitem"]', '[role="gridcell"]', '[role="row"]',
                '[role="switch"]', '[role="checkbox"]', '[role="radio"]', '[role="textbox"]',
                '[role="searchbox"]', '[role="spinbutton"]', '[role="slider"]', '[role="separator"]',
                '[tabindex]:not([tabindex="-1"])', '[contenteditable="true"]',
                'div[role]', 'span[role]', 'li[role]',
                '[class*="play"]', '[class*="pause"]', '[class*="control"]',
                '[class*="forward"]', '[class*="back"]', '[class*="next"]', '[class*="prev"]',
                '[aria-label*="Play"]', '[aria-label*="Pause"]', '[aria-label*="Mute"]'
              ];

              const elements = new Set();

              function collect(root) {
                try {
                  root.querySelectorAll(baseSelectors.join(',')).forEach(el => elements.add(el));
                } catch(e) {}
                // Shadow DOM
                root.querySelectorAll('*').forEach(node => {
                  if (node.shadowRoot) collect(node.shadowRoot);
                });
                // Same-origin iframes
                root.querySelectorAll('iframe').forEach(iframe => {
                  try {
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (doc) collect(doc);
                  } catch(e) {}
                });
              }

              collect(document);

              const visible = Array.from(elements).filter(el => {
                const rect = el.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0 &&
                       rect.bottom > 0 && rect.top < window.innerHeight &&
                       rect.right > 0 && rect.left < window.innerWidth;
              });

              visible.sort((a,b) => {
                const ra = a.getBoundingClientRect(), rb = b.getBoundingClientRect();
                if (Math.abs(ra.top - rb.top) < 5) return ra.left - rb.left;
                return ra.top - rb.top;
              });

              visible.forEach((el, idx) => {
                const num = idx + 1;
                el.setAttribute('data-rubika-sel-id', num);
                const rect = el.getBoundingClientRect();
                const overlay = document.createElement('div');
                overlay.className = 'rubika-hl-overlay';
                overlay.style.cssText = `position:fixed;top:${Math.max(0,rect.top)}px;left:${Math.max(0,rect.left)}px;width:${Math.min(rect.width,window.innerWidth-rect.left)}px;height:${Math.min(rect.height,window.innerHeight-rect.top)}px;background:rgba(255,0,0,0.1);border:2px dashed red;z-index:999996;pointer-events:none;box-sizing:border-box`;
                document.body.appendChild(overlay);

                const badge = document.createElement('div');
                badge.className = 'rubika-hl-badge';
                badge.style.cssText = `position:fixed;top:${Math.max(2,rect.top-6)}px;left:${Math.max(2,rect.left-6)}px;background:black;color:white;border-radius:50%;width:20px;height:20px;font-size:11px;line-height:20px;text-align:center;font-weight:bold;z-index:999999;pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,0.5)`;
                badge.textContent = num;
                document.body.appendChild(badge);
              });

              return visible.length;
            });
          }

          async function removeHighlights(page) {
            await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-sel-id]').forEach(el => el.removeAttribute('data-rubika-sel-id'));
            });
          }

          async function clickByNumber(page, number) {
            try {
              const found = await page.evaluate((num) => {
                const el = document.querySelector(`[data-rubika-sel-id="${num}"]`);
                if (!el) return false;
                el.scrollIntoView({ block: 'center', inline: 'center' });
                el.focus({ preventScroll: true });
                return true;
              }, number);
              if (!found) return false;

              const navPromise = page.waitForNavigation({ waitUntil: 'networkidle2', timeout: 8000 }).catch(() => null);
              await page.evaluate((num) => {
                const el = document.querySelector(`[data-rubika-sel-id="${num}"]`);
                if (el) {
                  if (el.tagName === 'A' && el.target === '_blank') el.target = '_self';
                  el.click();
                }
              }, number);
              await navPromise;
              await sleep(1000);
              return true;
            } catch(e) {
              log('⚠️ مدیریت ناوبری پس از کلیک');
              await sleep(2000);
              return true;
            }
          }

          // ======================== اسکرول هوشمند (چند ناحیه‌ای) ========================
          async function highlightScrollableAreas(page) {
            return await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-scroll-id]').forEach(el => el.removeAttribute('data-rubika-scroll-id'));

              const areas = [];
              // 1. main window (if scrollable)
              const docEl = document.documentElement;
              if (docEl.scrollHeight > window.innerHeight) {
                areas.push({ type: 'window', rect: { top:0, left:0, width: window.innerWidth, height: window.innerHeight } });
              }

              // 2. all scrollable elements (vertical overflow)
              const all = document.querySelectorAll('*');
              all.forEach(el => {
                const style = window.getComputedStyle(el);
                const overflowY = style.overflowY;
                if ((overflowY === 'auto' || overflowY === 'scroll') && el.scrollHeight > el.clientHeight) {
                  const rect = el.getBoundingClientRect();
                  if (rect.width > 20 && rect.height > 20) { // avoid tiny items
                    areas.push({ type: 'element', el });
                  }
                }
              });

              // شماره‌گذاری و هایلایت
              areas.forEach((area, idx) => {
                const num = idx + 1;
                if (area.type === 'window') {
                  // window highlight: whole viewport
                  const overlay = document.createElement('div');
                  overlay.className = 'rubika-hl-overlay';
                  overlay.style.cssText = `position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,255,0,0.05);border:2px dashed green;z-index:999996;pointer-events:none;box-sizing:border-box`;
                  document.body.appendChild(overlay);
                  area._overlay = overlay;
                  const badge = document.createElement('div');
                  badge.className = 'rubika-hl-badge';
                  badge.style.cssText = `position:fixed;top:5px;left:5px;background:green;color:white;border-radius:50%;width:24px;height:24px;font-size:12px;line-height:24px;text-align:center;font-weight:bold;z-index:999999;pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,0.5)`;
                  badge.textContent = num;
                  document.body.appendChild(badge);
                  area._badge = badge;
                } else {
                  const el = area.el;
                  el.setAttribute('data-rubika-scroll-id', num);
                  const rect = el.getBoundingClientRect();
                  const overlay = document.createElement('div');
                  overlay.className = 'rubika-hl-overlay';
                  overlay.style.cssText = `position:fixed;top:${Math.max(0,rect.top)}px;left:${Math.max(0,rect.left)}px;width:${Math.min(rect.width,window.innerWidth-rect.left)}px;height:${Math.min(rect.height,window.innerHeight-rect.top)}px;background:rgba(0,255,0,0.1);border:2px dashed green;z-index:999996;pointer-events:none;box-sizing:border-box`;
                  document.body.appendChild(overlay);
                  area._overlay = overlay;
                  const badge = document.createElement('div');
                  badge.className = 'rubika-hl-badge';
                  badge.style.cssText = `position:fixed;top:${Math.max(2,rect.top-6)}px;left:${Math.max(2,rect.left-6)}px;background:green;color:white;border-radius:50%;width:24px;height:24px;font-size:12px;line-height:24px;text-align:center;font-weight:bold;z-index:999999;pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,0.5)`;
                  badge.textContent = num;
                  document.body.appendChild(badge);
                  area._badge = badge;
                }
              });

              return areas.length;
            });
          }

          async function scrollAreaByPixel(page, areaIndex, px, direction) {
            const sign = direction === 'up' ? -1 : 1;
            await page.evaluate(({idx, px, sign}) => {
              const el = document.querySelector(`[data-rubika-scroll-id="${idx}"]`);
              if (el) {
                el.scrollBy(0, sign * px);
              } else if (idx === 1) {
                // window area (idx 1 if exists)
                window.scrollBy(0, sign * px);
              }
            }, {idx: areaIndex, px, sign});
          }

          async function removeScrollHighlights(page) {
            await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-scroll-id]').forEach(el => el.removeAttribute('data-rubika-scroll-id'));
            });
          }

          // ======================== ویدیوهای صفحه (پیشرفته + yt-dlp) ========================
          async function highlightVideoElements(page) {
            const pageUrl = page.url();
            const videoData = await page.evaluate(() => {
              const results = [];
              const videos = document.querySelectorAll('video');
              videos.forEach(v => {
                const src = v.currentSrc || v.querySelector('source')?.src || '';
                if (src) results.push({ src, type: 'direct' });
              });
              const extensions = ['mp4', 'webm', 'ogg', 'mov', 'mkv', 'avi', 'flv'];
              const links = document.querySelectorAll('a');
              links.forEach(a => {
                const href = a.href;
                const ext = href.split('.').pop().split('?')[0].toLowerCase();
                if (extensions.includes(ext)) results.push({ src: href, type: 'direct' });
              });
              const iframes = document.querySelectorAll('iframe');
              const embedPatterns = [
                { pattern: /youtube\.com\/embed\/([\w-]+)/, platform: 'youtube' },
                { pattern: /player\.vimeo\.com\/video\/(\d+)/, platform: 'vimeo' },
                { pattern: /dailymotion\.com\/embed\/video\/([\w]+)/, platform: 'dailymotion' },
                { pattern: /instagram\.com\/.*\/embed/, platform: 'instagram' }
              ];
              iframes.forEach(iframe => {
                const src = iframe.src;
                if (!src) return;
                for (const {pattern, platform} of embedPatterns) {
                  if (src.match(pattern)) {
                    results.push({ src, type: 'embed', platform });
                    break;
                  }
                }
              });
              const unique = [];
              const seen = new Set();
              for (const r of results) {
                if (seen.has(r.src)) continue;
                seen.add(r.src);
                unique.push(r);
              }
              return unique;
            });

            await page.evaluate((list) => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-video-id]').forEach(el => el.removeAttribute('data-rubika-video-id'));

              list.forEach((item, idx) => {
                let el = null;
                if (item.type === 'direct') {
                  el = document.querySelector(`video[src="${item.src}"], video source[src="${item.src}"]`);
                  if (!el) el = document.querySelector(`a[href="${item.src}"]`);
                } else {
                  el = document.querySelector(`iframe[src="${item.src}"]`);
                }
                if (!el) return;
                const num = idx + 1;
                el.setAttribute('data-rubika-video-id', num);
                const rect = el.getBoundingClientRect();
                const overlay = document.createElement('div');
                overlay.className = 'rubika-hl-overlay';
                overlay.style.cssText = `position:fixed;top:${Math.max(0,rect.top)}px;left:${Math.max(0,rect.left)}px;width:${Math.min(rect.width,window.innerWidth-rect.left)}px;height:${Math.min(rect.height,window.innerHeight-rect.top)}px;background:rgba(0,0,255,0.15);border:2px dashed blue;z-index:999996;pointer-events:none`;
                document.body.appendChild(overlay);

                const badge = document.createElement('div');
                badge.className = 'rubika-hl-badge';
                badge.style.cssText = `position:fixed;top:${Math.max(2,rect.top-6)}px;left:${Math.max(2,rect.left-6)}px;background:blue;color:white;border-radius:50%;width:24px;height:24px;font-size:12px;line-height:24px;text-align:center;font-weight:bold;z-index:999999;pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,0.5)`;
                badge.textContent = num;
                document.body.appendChild(badge);
              });
            }, videoData);

            return { videos: videoData, pageUrl };
          }

          async function removeVideoHighlights(page) {
            await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-video-id]').forEach(el => el.removeAttribute('data-rubika-video-id'));
            });
          }

          async function downloadVideo(url, type, referer, platform, pageUrl) {
            const dir = 'downloaded_videos';
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            const timestamp = Date.now();

            // Fallback to yt-dlp if blob or direct failed
            if (type === 'direct' && url.startsWith('blob:')) {
              log('📥 blob URL detected, using yt-dlp with page URL');
              const outPath = path.join(dir, `video_${timestamp}_page.mp4`);
              try {
                execSync(`yt-dlp --proxy socks5://127.0.0.1:10808 -o "${outPath}" "${pageUrl}"`, { stdio: 'inherit', timeout: 600000 });
                return { ok: true, path: outPath, name: path.basename(outPath) };
              } catch(e) {
                err('yt-dlp failed:', e.message);
                return { ok: false, error: e.message };
              }
            }

            if (type === 'direct') {
              const parsed = new URL(url);
              const base = path.basename(parsed.pathname) || 'video.mp4';
              const outPath = path.join(dir, `video_${timestamp}_${base}`);
              log(`📥 دانلود مستقیم: ${url}`);
              try {
                execSync(`curl --socks5 127.0.0.1:10808 -L -e "${referer}" -A "Mozilla/5.0" -o "${outPath}" "${url}"`, { stdio: 'inherit', timeout: 600000 });
                return { ok: true, path: outPath, name: path.basename(outPath) };
              } catch(e) {
                log('⚠️ دانلود مستقیم شکست خورد، تلاش با yt-dlp...');
                const fallbackPath = path.join(dir, `video_${timestamp}_page.mp4`);
                try {
                  execSync(`yt-dlp --proxy socks5://127.0.0.1:10808 -o "${fallbackPath}" "${pageUrl}"`, { stdio: 'inherit', timeout: 600000 });
                  return { ok: true, path: fallbackPath, name: path.basename(fallbackPath) };
                } catch(e2) {
                  err('yt-dlp نیز شکست خورد:', e2.message);
                  return { ok: false, error: e2.message };
                }
              }
            } else if (type === 'embed') {
              const outPath = path.join(dir, `video_${timestamp}_${platform || 'embed'}.mp4`);
              log(`📥 دانلود embed با yt-dlp: ${url}`);
              try {
                execSync(`yt-dlp --proxy socks5://127.0.0.1:10808 -o "${outPath}" "${url}"`, { stdio: 'inherit', timeout: 600000 });
                return { ok: true, path: outPath, name: path.basename(outPath) };
              } catch(e) {
                err('yt-dlp failed:', e.message);
                return { ok: false, error: e.message };
              }
            }
            return { ok: false, error: 'نوع نامشخص' };
          }

          async function splitAndCommit(filePath, baseName) {
            const MAX_SIZE = 50 * 1024 * 1024; // 50MB
            const stats = fs.statSync(filePath);
            if (stats.size <= 100 * 1024 * 1024) {
              try {
                execSync(`git config user.name "github-actions" && git config user.email "actions@github.com"`);
                execSync(`git add "${filePath}" && git commit -m "دانلود ویدیو ${baseName}" && git push`);
                return true;
              } catch(e) {
                err('خطا در commit مستقیم:', e.message);
                return false;
              }
            } else {
              const partDir = path.join(path.dirname(filePath), 'parts');
              if (!fs.existsSync(partDir)) fs.mkdirSync(partDir);
              const prefix = path.join(partDir, baseName + '.part');
              execSync(`split -b ${MAX_SIZE} "${filePath}" "${prefix}"`);
              fs.unlinkSync(filePath);
              const parts = fs.readdirSync(partDir).filter(f => f.startsWith(baseName + '.part'));
              for (let i = 0; i < parts.length; i++) {
                const partPath = path.join(partDir, parts[i]);
                execSync(`git config user.name "github-actions" && git config user.email "actions@github.com"`);
                execSync(`git add "${partPath}" && git commit -m "دانلود ویدیو ${baseName} (قسمت ${i+1}/${parts.length})"`);
              }
              execSync(`git push`);
              return true;
            }
          }

          // ======================== زوم صفحه ========================
          async function zoomPage(page, zoomIn = true) {
            const currentZoom = await page.evaluate(() => {
              let zoom = getComputedStyle(document.body).zoom || '1.0';
              return parseFloat(zoom);
            });
            let newZoom = currentZoom;
            if (zoomIn) newZoom = Math.min(currentZoom + 0.1, 3.0);
            else newZoom = Math.max(currentZoom - 0.1, 0.3);
            await page.evaluate((z) => {
              document.body.style.zoom = z;
            }, newZoom.toString());
            return newZoom;
          }

          // ======================== کی‌پد کنترلی ========================
          function buildControlKeypad() {
            return {
              rows: [
                { buttons: [
                    { id: "SCROLL_UP",   type: "Simple", button_text: "⬆️ اسکرول بالا" },
                    { id: "SCROLL_DOWN", type: "Simple", button_text: "⬇️ اسکرول پایین" }
                ]},
                { buttons: [
                    { id: "TYPE",        type: "Simple", button_text: "⌨️ تایپ" },
                    { id: "GO_URL",      type: "Simple", button_text: "🌐 آدرس جدید" }
                ]},
                { buttons: [
                    { id: "SELECT",      type: "Simple", button_text: "🔍 انتخاب با شماره" },
                    { id: "VIDEOS",      type: "Simple", button_text: "🎥 ویدیوهای صفحه" }
                ]},
                { buttons: [
                    { id: "ENTER",       type: "Simple", button_text: "↵ Enter" },
                    { id: "SCREENSHOT",  type: "Simple", button_text: "📸 اسکرین‌شات" }
                ]},
                { buttons: [
                    { id: "ZOOM_IN",    type: "Simple", button_text: "🔍 زوم +" },
                    { id: "ZOOM_OUT",   type: "Simple", button_text: "🔍 زوم -" }
                ]},
                { buttons: [
                    { id: "REFRESH",     type: "Simple", button_text: "🔄 رفرش صفحه" },
                    { id: "CHANGE_PROXY",type: "Simple", button_text: "🔁 عوض کردن پروکسی" }
                ]}
              ],
              resize_keyboard: true,
              one_time_keyboard: false
            };
          }

          // ======================== مدیریت حالت ========================
          const chatStates = new Map();
          function getState(chatId) {
            if (!chatStates.has(chatId)) {
              chatStates.set(chatId, {
                typingMode: false,
                urlMode: false,
                scrollMultiMode: false,
                scrollDirection: null,
                scrollAreasCount: 0,
                scrollSelectedIndex: null,
                selectionMode: false,
                videoMode: false,
                videoData: null,
                pageUrlAtVideo: '',
                lastScreenshotMsgId: null,
                tempMessageIds: [],
                zoomLevel: 1.0
              });
            }
            return chatStates.get(chatId);
          }

          async function deleteTempMessages(chatId) {
            const state = getState(chatId);
            for (const msgId of state.tempMessageIds) {
              try { await deleteMessage(chatId, msgId); } catch(e) {}
            }
            state.tempMessageIds = [];
          }

          async function updateScreenshot(page, chatId) {
            const state = getState(chatId);
            const shotPath = `/tmp/shot_${chatId}_${Date.now()}.png`;
            await page.screenshot({ path: shotPath, fullPage: false });

            if (state.lastScreenshotMsgId) {
              try { await deleteMessage(chatId, state.lastScreenshotMsgId); } catch(e) {}
            }
            const keypad = buildControlKeypad();
            const newMsgId = await uploadAndSendFile(chatId, shotPath, 'Image', keypad);
            if (newMsgId) state.lastScreenshotMsgId = newMsgId;
            try { fs.unlinkSync(shotPath); } catch(e) {}
          }

          // ======================== پردازش دکمه‌ها ========================
          async function handleButton(page, chatId, buttonId, browserManager) {
            const state = getState(chatId);
            // ریست حالت‌های موقت
            state.typingMode = false;
            state.urlMode = false;
            state.selectionMode = false;
            state.videoMode = false;
            state.videoData = null;
            state.scrollMultiMode = false;
            state.scrollDirection = null;
            state.scrollAreasCount = 0;
            state.scrollSelectedIndex = null;

            switch(buttonId) {
              case 'SCROLL_UP':
                state.scrollMultiMode = true;
                state.scrollDirection = 'up';
                const upCount = await highlightScrollableAreas(page);
                state.scrollAreasCount = upCount;
                if (upCount === 0) {
                  await sendMessage(chatId, '⚠️ هیچ ناحیه اسکرولی یافت نشد.');
                  state.scrollMultiMode = false;
                } else {
                  const shotPath = `/tmp/scroll_${chatId}_${Date.now()}.png`;
                  await page.screenshot({ path: shotPath, fullPage: false });
                  if (state.lastScreenshotMsgId) try { await deleteMessage(chatId, state.lastScreenshotMsgId); } catch(e) {}
                  const keypad = buildControlKeypad();
                  const msgId = await uploadAndSendFile(chatId, shotPath, 'Image', keypad);
                  if (msgId) state.lastScreenshotMsgId = msgId;
                  try { fs.unlinkSync(shotPath); } catch(e) {}
                  await sendMessage(chatId, `🟢 ${upCount} ناحیه اسکرول با رنگ سبز نشانه‌گذاری شد.\nشماره ناحیه مورد نظر را وارد کنید.`);
                }
                return;
              case 'SCROLL_DOWN':
                state.scrollMultiMode = true;
                state.scrollDirection = 'down';
                const downCount = await highlightScrollableAreas(page);
                state.scrollAreasCount = downCount;
                if (downCount === 0) {
                  await sendMessage(chatId, '⚠️ هیچ ناحیه اسکرولی یافت نشد.');
                  state.scrollMultiMode = false;
                } else {
                  const shotPath = `/tmp/scroll_${chatId}_${Date.now()}.png`;
                  await page.screenshot({ path: shotPath, fullPage: false });
                  if (state.lastScreenshotMsgId) try { await deleteMessage(chatId, state.lastScreenshotMsgId); } catch(e) {}
                  const keypad = buildControlKeypad();
                  const msgId = await uploadAndSendFile(chatId, shotPath, 'Image', keypad);
                  if (msgId) state.lastScreenshotMsgId = msgId;
                  try { fs.unlinkSync(shotPath); } catch(e) {}
                  await sendMessage(chatId, `🟢 ${downCount} ناحیه اسکرول با رنگ سبز نشانه‌گذاری شد.\nشماره ناحیه مورد نظر را وارد کنید.`);
                }
                return;
              case 'TYPE':
                state.typingMode = true;
                await sendMessage(chatId, '⌨️ متن مورد نظر را ارسال کنید:');
                return;
              case 'GO_URL':
                state.urlMode = true;
                await sendMessage(chatId, '🌐 آدرس کامل را ارسال کنید:');
                return;
              case 'SELECT':
                state.selectionMode = true;
                const count = await highlightClickableElements(page);
                if (count === 0) {
                  await sendMessage(chatId, '⚠️ هیچ عنصر قابل کلیکی یافت نشد.');
                  state.selectionMode = false;
                  return;
                }
                const selShotPath = `/tmp/sel_${chatId}_${Date.now()}.png`;
                await page.screenshot({ path: selShotPath, fullPage: false });
                if (state.lastScreenshotMsgId) try { await deleteMessage(chatId, state.lastScreenshotMsgId); } catch(e) {}
                const selKeypad = buildControlKeypad();
                const selMsgId = await uploadAndSendFile(chatId, selShotPath, 'Image', selKeypad);
                if (selMsgId) state.lastScreenshotMsgId = selMsgId;
                try { fs.unlinkSync(selShotPath); } catch(e) {}
                await sendMessage(chatId, `🔢 ${count} عنصر نشانه‌گذاری شد. شماره را وارد کنید.`);
                return;
              case 'VIDEOS':
                state.videoMode = true;
                const { videos, pageUrl } = await highlightVideoElements(page);
                state.videoData = videos;
                state.pageUrlAtVideo = pageUrl;
                if (videos.length === 0) {
                  await sendMessage(chatId, '❌ هیچ ویدیویی پیدا نشد.');
                  state.videoMode = false;
                  return;
                }
                const vidShotPath = `/tmp/vid_${chatId}_${Date.now()}.png`;
                await page.screenshot({ path: vidShotPath, fullPage: false });
                if (state.lastScreenshotMsgId) try { await deleteMessage(chatId, state.lastScreenshotMsgId); } catch(e) {}
                const vidKeypad = buildControlKeypad();
                const vidMsgId = await uploadAndSendFile(chatId, vidShotPath, 'Image', vidKeypad);
                if (vidMsgId) state.lastScreenshotMsgId = vidMsgId;
                try { fs.unlinkSync(vidShotPath); } catch(e) {}
                await sendMessage(chatId, `🎥 ${videos.length} ویدیو با رنگ آبی نشانه‌گذاری شد.\nشماره مورد نظر را برای دانلود بفرستید.`);
                return;
              case 'ENTER':
                try {
                  const navPromise = page.waitForNavigation({ waitUntil: 'networkidle2', timeout: 5000 }).catch(() => null);
                  await page.keyboard.press('Enter');
                  await navPromise;
                  await sleep(1000);
                } catch(e) {
                  log('⚠️ مدیریت ناوبری پس از Enter');
                  await sleep(1500);
                }
                break;
              case 'SCREENSHOT':
                break;
              case 'ZOOM_IN': {
                const newZ = await zoomPage(page, true);
                state.zoomLevel = newZ;
                await sendMessage(chatId, `🔍 زوم به ${newZ.toFixed(1)}x تغییر کرد.`);
                break;
              }
              case 'ZOOM_OUT': {
                const newZ = await zoomPage(page, false);
                state.zoomLevel = newZ;
                await sendMessage(chatId, `🔍 زوم به ${newZ.toFixed(1)}x تغییر کرد.`);
                break;
              }
              case 'REFRESH':
                try {
                  await page.reload({ waitUntil: 'networkidle2', timeout: 30000 });
                  await sleep(1000);
                  await page.evaluate((z) => { document.body.style.zoom = z; }, state.zoomLevel.toString()); // reapply zoom
                } catch(e) {
                  err('خطا در رفرش:', e.message);
                  await sendMessage(chatId, '❌ رفرش با مشکل مواجه شد.');
                }
                break;
              case 'CHANGE_PROXY':
                const switched = await browserManager.switchProxy();
                if (switched) {
                  await sendMessage(chatId, '🔁 پروکسی با موفقیت تغییر کرد.');
                } else {
                  await sendMessage(chatId, '❌ هیچ پروکسی سالمی یافت نشد.');
                  process.exit(1);
                }
                return;
            }

            if (!['SCROLL_UP', 'SCROLL_DOWN', 'TYPE', 'GO_URL', 'SELECT', 'VIDEOS', 'CHANGE_PROXY'].includes(buttonId)) {
              await updateScreenshot(page, chatId);
            }
          }

          // ======================== پردازش ورودی‌های متنی ========================
          async function handleTextInput(page, chatId, text) {
            const state = getState(chatId);
            // اولویت با حالت اسکرول چندگانه
            if (state.scrollMultiMode) {
              if (state.scrollSelectedIndex === null) {
                const idx = parseInt(text);
                if (isNaN(idx) || idx < 1 || idx > state.scrollAreasCount) {
                  const msg = await sendMessage(chatId, `❌ شماره بین ۱ تا ${state.scrollAreasCount} وارد کنید.`);
                  state.tempMessageIds.push(msg?.data?.message_id);
                  return;
                }
                state.scrollSelectedIndex = idx;
                await removeScrollHighlights(page);
                const dirText = state.scrollDirection === 'up' ? 'بالا' : 'پایین';
                const msg = await sendMessage(chatId, `✅ ناحیه ${idx} انتخاب شد.\nچند پیکسل به ${dirText} اسکرول کنم؟`);
                state.tempMessageIds.push(msg?.data?.message_id);
                return;
              } else {
                const px = parseInt(text);
                if (isNaN(px) || px <= 0) {
                  const msg = await sendMessage(chatId, '❌ عدد مثبت وارد کنید.');
                  state.tempMessageIds.push(msg?.data?.message_id);
                  return;
                }
                await scrollAreaByPixel(page, state.scrollSelectedIndex, px, state.scrollDirection);
                await sleep(300);
                state.scrollMultiMode = false;
                state.scrollDirection = null;
                state.scrollAreasCount = 0;
                state.scrollSelectedIndex = null;
                await updateScreenshot(page, chatId);
                return;
              }
            }
            // دیگر حالت‌ها
            if (state.typingMode) {
              state.typingMode = false;
              if (text) {
                log(`⌨️ تایپ "${text}" در ${chatId}`);
                await page.keyboard.type(text, { delay: 50 });
                await sleep(300);
                await updateScreenshot(page, chatId);
              }
              return;
            }
            if (state.urlMode) {
              state.urlMode = false;
              if (text) {
                log(`🌐 رفتن به ${text} از ${chatId}`);
                try {
                  await page.goto(text, { waitUntil: 'networkidle2', timeout: 30000 });
                  await sleep(2000);
                  await page.evaluate((z) => { document.body.style.zoom = z; }, state.zoomLevel.toString());
                  await updateScreenshot(page, chatId);
                } catch(e) {
                  err('بارگذاری ناموفق:', e.message);
                  await sendMessage(chatId, `❌ خطا در باز کردن آدرس: ${e.message}`);
                }
              }
              return;
            }
            if (state.selectionMode) {
              const num = parseInt(text);
              if (isNaN(num) || num <= 0) {
                const msg = await sendMessage(chatId, '❌ عدد معتبر وارد کنید.');
                state.tempMessageIds.push(msg?.data?.message_id);
                return;
              }
              const success = await clickByNumber(page, num);
              if (!success) {
                const msg = await sendMessage(chatId, `❌ کلیک روی عنصر ${num} ناموفق بود.`);
                state.tempMessageIds.push(msg?.data?.message_id);
              } else {
                log(`✅ کلیک روی عنصر شماره ${num} موفق`);
              }
              await removeHighlights(page);
              state.selectionMode = false;
              await sleep(300);
              await updateScreenshot(page, chatId);
              return;
            }
            if (state.videoMode) {
              const num = parseInt(text);
              const videos = state.videoData;
              if (isNaN(num) || num < 1 || num > videos.length) {
                const msg = await sendMessage(chatId, '❌ شماره نامعتبر.');
                state.tempMessageIds.push(msg?.data?.message_id);
                return;
              }
              const selected = videos[num-1];
              await sendMessage(chatId, `📥 در حال دانلود ویدیوی شماره ${num} ...`);
              const result = await downloadVideo(selected.src, selected.type, state.pageUrlAtVideo, selected.platform, state.pageUrlAtVideo);
              if (result.ok) {
                const committed = await splitAndCommit(result.path, result.name);
                if (committed) {
                  await sendMessage(chatId, `✅ ویدیو با نام \`${result.name}\` دانلود و ذخیره شد.`);
                } else {
                  await sendMessage(chatId, `⚠️ ویدیو دانلود شد اما ذخیره ناموفق بود.`);
                }
              } else {
                await sendMessage(chatId, `❌ خطا در دانلود: ${result.error || 'نامشخص'}`);
              }
              await removeVideoHighlights(page);
              state.videoMode = false;
              state.videoData = null;
              state.pageUrlAtVideo = '';
              await sleep(300);
              await updateScreenshot(page, chatId);
              return;
            }
            // دستورات ساده
            if (text === '/start') {
              await sendMessage(chatId, '🟢 ربات آماده است.');
              if (!state.lastScreenshotMsgId) await updateScreenshot(page, chatId);
            } else if (text === 'help') {
              await sendMessage(chatId, '🎮 دکمه‌ها:\n⬆️⬇️ اسکرول (ناحیه‌ای)\n⌨️ تایپ\n🌐 آدرس جدید\n🔍 انتخاب با شماره\n🎥 ویدیوهای صفحه\n↵ Enter\n📸 اسکرین‌شات\n🔍 زوم +/-\n🔄 رفرش\n🔁 عوض کردن پروکسی');
            }
          }

          // ======================== مدیریت پروکسی و مرورگر ========================
          class BrowserManager {
            constructor(proxies) {
              this.proxies = proxies;
              this.browser = null;
              this.page = null;
              this.xrayProc = null;
              this.currentProxyIndex = -1;
            }

            async startBrowserWithProxy(index) {
              if (this.xrayProc) { this.xrayProc.kill(); await sleep(500); }
              if (this.browser) { try { await this.browser.close(); } catch(_) {} }

              const uri = this.proxies[index];
              log(`🔌 تست پروکسی ${index+1}/${this.proxies.length}: ${uri.substring(0,60)}...`);
              this.xrayProc = await startXray(uri, index);
              if (!this.xrayProc) throw new Error('Xray start failed');
              if (!testCurl(10808)) throw new Error('Curl failed');

              this.browser = await puppeteer.launch({
                headless: 'new',
                args: [
                  '--no-sandbox','--disable-setuid-sandbox',
                  '--proxy-server=socks5://127.0.0.1:10808',
                  '--disable-dev-shm-usage','--window-size=1280,720'
                ],
                defaultViewport: null
              });
              this.page = await this.browser.newPage();
              await this.page.setViewport({ width: 1280, height: 720, deviceScaleFactor: 1 });
              await this.page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/125.0.0.0');
              await this.page.evaluate(() => { document.body.style.zoom = '1.0'; });
            }

            async findWorkingProxy() {
              for (let i = 0; i < this.proxies.length; i++) {
                try {
                  await this.startBrowserWithProxy(i);
                  await this.page.goto(TARGET_URL, { waitUntil: 'networkidle2', timeout: 30000 });
                  await sleep(2000);
                  const blocked = await this.page.evaluate(() => {
                    const bodyText = document.body.innerText.toLowerCase();
                    return ['access denied', 'you have been blocked', 'cloudflare', 'attention required'].some(t => bodyText.includes(t));
                  });
                  if (blocked) { log('⛔ پروکسی بلاک دارد. بعدی.'); continue; }
                  this.currentProxyIndex = i;
                  log('✅ اتصال موفق.');
                  return true;
                } catch(e) { err('خطا در تست پروکسی:', e.message); }
              }
              return false;
            }

            async switchProxy() {
              let newIdx = (this.currentProxyIndex + 1) % this.proxies.length;
              for (let attempts = 0; attempts < this.proxies.length; attempts++) {
                try {
                  await this.startBrowserWithProxy(newIdx);
                  await this.page.goto(TARGET_URL, { waitUntil: 'networkidle2', timeout: 30000 });
                  await sleep(2000);
                  const blocked = await this.page.evaluate(() => {
                    const bodyText = document.body.innerText.toLowerCase();
                    return ['access denied', 'you have been blocked', 'cloudflare', 'attention required'].some(t => bodyText.includes(t));
                  });
                  if (blocked) { log('پروکسی جدید بلاک دارد، بعدی...'); newIdx = (newIdx + 1) % this.proxies.length; continue; }
                  this.currentProxyIndex = newIdx;
                  log(`✅ پروکسی به شماره ${newIdx+1} تغییر کرد.`);
                  if (OWNER) await updateScreenshot(this.page, OWNER);
                  return true;
                } catch(e) { log('خطا با پروکسی:', e.message); newIdx = (newIdx + 1) % this.proxies.length; }
              }
              return false;
            }
          }

          // ======================== اجرای اصلی ========================
          (async () => {
            try {
              const me = await api('getMe');
              const bot = me?.data?.bot;
              if (!bot?.username) { err('توکن نامعتبر'); process.exit(1); }
              log('✅ ربات:', bot.username);

              if (!fs.existsSync(PROXY_FILE)) {
                err(`فایل ${PROXY_FILE} یافت نشد.`);
                process.exit(1);
              }

              const proxies = fs.readFileSync(PROXY_FILE, 'utf8')
                .split('\n').map(l => l.trim())
                .filter(l => /^(vless|trojan|ss|vmess):\/\//.test(l));
              log(`${proxies.length} کانفیگ خوب بارگذاری شد.`);

              const browserManager = new BrowserManager(proxies);
              const found = await browserManager.findWorkingProxy();
              if (!found) { err('هیچ پروکسی سالمی یافت نشد.'); process.exit(1); }

              const page = browserManager.page;
              if (OWNER) await sendMessage(OWNER, '🟢 ربات روشن شد.');
              else log('⚠️ OWNER_CHAT_ID تنظیم نشده.');

              log('🧹 پاک‌سازی تاریخچه...');
              let offset = null, flushed = 0;
              while (true) {
                const params = { limit: 10 };
                if (offset !== null) params.offset_id = offset;
                const upRes = await api('getUpdates', params);
                if (upRes.error) break;
                const updates = upRes?.data?.updates;
                if (!updates || updates.length === 0) break;
                flushed += updates.length;
                if (upRes.data?.next_offset_id) offset = upRes.data.next_offset_id;
                else break;
              }
              log(`✅ تاریخچه پاک شد (${flushed} آپدیت). offset: ${offset || 'ندارد'}`);

              const ownerChat = OWNER;
              if (ownerChat) await updateScreenshot(page, ownerChat);

              let consecutiveErrors = 0;
              const END_TIME = Date.now() + 17380 * 1000;

              while (Date.now() < END_TIME) {
                try {
                  const params = { limit: 10 };
                  if (offset !== null) params.offset_id = offset;
                  const upRes = await api('getUpdates', params);
                  if (upRes.error) {
                    consecutiveErrors++;
                    if (consecutiveErrors >= 3) { offset = null; consecutiveErrors = 0; }
                    await sleep(5000);
                    continue;
                  }
                  consecutiveErrors = 0;
                  const updates = upRes?.data?.updates;

                  if (updates?.length) {
                    for (const upd of updates) {
                      if (upd.type !== 'NewMessage') continue;
                      const chatId = upd.chat_id;
                      const msg = upd.new_message;
                      if (!msg) continue;

                      const state = getState(chatId);
                      const buttonId = msg.aux_data?.button_id;
                      const text = (msg.text || '').trim();

                      await deleteTempMessages(chatId);

                      if (buttonId) {
                        log(`🔘 دکمه ${buttonId} از ${chatId}`);
                        await handleButton(page, chatId, buttonId, browserManager);
                      } else {
                        await handleTextInput(page, chatId, text);
                      }
                    }
                    if (upRes.data?.next_offset_id) offset = upRes.data.next_offset_id;
                  }
                } catch(e) {
                  err('خطای حلقه اصلی:', e.message);
                  await sleep(5000);
                }
                await sleep(4000);
              }

              log('⏰ خاموشی خودکار.');
              await browserManager.browser.close();
              browserManager.xrayProc.kill();
              if (OWNER) await sendMessage(OWNER, '⏹️ ربات خاموش شد.');
            } catch(fatalError) {
              err('🚨 خطای مرگبار:', fatalError.message);
              console.error(fatalError);
              process.exit(1);
            }
          })();
          ENDSCRIPT

