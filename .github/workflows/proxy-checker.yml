name: 🌐 Groq Remote Browser (Ultra‑Smart Pro)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  remote-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🧰 Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y curl unzip
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d xray && chmod +x xray/xray
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: 🤖 Run ultra‑smart bot
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          RUBIKA_OWNER_CHAT_ID: ${{ secrets.RUBIKA_OWNER_CHAT_ID }}
        run: |
          cat > agent.cjs << 'ENDSCRIPT'
          const { spawn } = require('child_process');
          const fs = require('fs');
          const path = require('path');
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());

          const PROXY_FILE = 'کانفیگ های خوب.txt';
          const TARGET_URL = 'https://console.groq.com/playground';
          const BLOCKED_PATTERNS = [
            'access denied', 'please check your network settings',
            'you have been blocked', 'request blocked', 'cloudflare',
            'attention required', 'i am not a robot', 'recaptcha',
            'sorry, you have been blocked', 'just a moment'
          ];

          function ts() { return new Date().toISOString().replace('T',' ').substring(0,19); }
          function log(...args) { console.log(`[${ts()}]`, ...args); }
          function err(...args) { console.error(`[${ts()}] ❌`, ...args); }

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // ------------------ Xray Helpers ------------------
          function parseURI(uri) { try { const u = new URL(uri); return { protocol: u.protocol.replace(':',''), uuid: u.username, address: u.hostname, port: u.port, params: Object.fromEntries(u.searchParams.entries()) }; } catch(e) { return null; } }

          function generateXrayConfig(uri) {
            const p = parseURI(uri);
            if (!p) return null;
            const inbound = { port: 10808, protocol: 'socks', settings: { auth: 'noauth', udp: true } };
            let outbound = { protocol: p.protocol, settings: p.protocol === 'trojan' ? { servers: [{ address: p.address, port: parseInt(p.port), password: p.uuid }] } : { vnext: [{ address: p.address, port: parseInt(p.port), users: [{ id: p.uuid, encryption: p.params.encryption || 'none', flow: p.params.flow || '' }] }] }, streamSettings: { network: p.params.type || 'tcp' } };
            const network = p.params.type || 'tcp'; outbound.streamSettings.network = network;
            if (network === 'ws') outbound.streamSettings.wsSettings = { path: p.params.path || '/', headers: p.params.host ? { Host: p.params.host } : {} };
            const security = p.params.security || 'none';
            if (security === 'tls' || security === 'reality') {
              outbound.streamSettings.security = security;
              const tls = { serverName: p.params.sni || p.address };
              if (security === 'reality') { tls.fingerprint = p.params.fp || 'chrome'; tls.publicKey = p.params.pbk || ''; tls.shortId = p.params.sid || ''; tls.spiderX = ''; }
              if (p.params.allowInsecure === '1') tls.allowInsecure = true;
              if (p.params.alpn) tls.alpn = p.params.alpn.split(',');
              outbound.streamSettings.tlsSettings = tls;
            } else outbound.streamSettings.security = 'none';
            return { inbounds: [inbound], outbounds: [outbound] };
          }

          async function startXray(uri, idx) {
            const cfg = generateXrayConfig(uri); if (!cfg) return null;
            const cfgPath = `/tmp/xray_${idx}.json`;
            fs.writeFileSync(cfgPath, JSON.stringify(cfg, null, 2));
            const xray = spawn(path.join(process.cwd(), 'xray', 'xray'), ['run', '-config', cfgPath], { stdio: 'pipe' });
            await new Promise(r => setTimeout(r, 4000));
            return xray;
          }

          function testCurl(port) { try { require('child_process').execSync(`curl --socks5 127.0.0.1:${port} --max-time 5 -s http://ip-api.com/json`, { encoding: 'utf8' }); return true; } catch(e) { return false; } }

          // ------------------ Rubika API ------------------
          const TOKEN = process.env.RUBIKA_BOT_TOKEN;
          const OWNER = process.env.RUBIKA_OWNER_CHAT_ID || '';
          const BASE = `https://botapi.rubika.ir/v3/${TOKEN}`;

          async function api(method, body = {}) {
            try {
              const res = await fetch(`${BASE}/${method}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
              const text = await res.text();
              try { return JSON.parse(text); } catch(e) { err('API raw:', text.substring(0,200)); return { error:true, raw:text }; }
            } catch(e) { return { error:true, message:e.message }; }
          }

          async function sendMessage(chatId, text, extra={}) { return await api('sendMessage', { chat_id:chatId, text, ...extra }); }
          async function deleteMessage(chatId, msgId) { if (msgId) await api('deleteMessage', { chat_id:chatId, message_id:msgId }); }

          async function uploadAndSendFile(chatId, filePath, fileType, keypad=null) {
            const req = await api('requestSendFile', { type:fileType });
            const uploadUrl = req?.data?.upload_url; if (!uploadUrl) return null;
            const buf = fs.readFileSync(filePath);
            const form = new FormData();
            form.append('file', new Blob([buf], { type:'application/octet-stream' }), path.basename(filePath));
            const upRes = await fetch(uploadUrl, { method:'POST', body:form });
            const upJson = await upRes.json();
            const fileId = upJson?.file_id || upJson?.data?.file_id; if (!fileId) return null;
            const sendBody = { chat_id:chatId, file_id:fileId };
            if (keypad) { sendBody.chat_keypad = keypad; sendBody.chat_keypad_type = 'New'; }
            const sres = await api('sendFile', sendBody);
            return sres?.data?.message_id || null;
          }

          // ------------------ Safe Evaluate ------------------
          async function safeEvaluate(page, fn, ...args) {
            for (let i=0; i<4; i++) {
              try { return await page.evaluate(fn, ...args); } catch(e) {
                if (e.message.includes('Execution context was destroyed') || e.message.includes('detached Frame') || e.message.includes('Target closed')) {
                  log(`🔄 Retry evaluate (${i+1}/4)`); await sleep(2000);
                  try { await page.waitForSelector('body',{timeout:5000}); } catch(_){}
                  continue;
                }
                throw e;
              }
            }
            throw new Error('Safe evaluate failed');
          }

          // ------------------ Block detection ------------------
          async function isPageBlocked(page) {
            try {
              return await safeEvaluate(page, (patterns) => {
                const txt = document.body.innerText.toLowerCase();
                const title = document.title.toLowerCase();
                for (const p of patterns) if (txt.includes(p) || title.includes(p)) return true;
                return false;
              }, BLOCKED_PATTERNS);
            } catch(e) { return false; }
          }

          // ------------------ Ultra‑smart element highlighter ------------------
          async function highlightClickableElements(page) {
            return await safeEvaluate(page, () => {
              // Clean previous
              document.querySelectorAll('.rubika-hl-badge,.rubika-hl-overlay').forEach(e=>e.remove());
              document.querySelectorAll('[data-rubika-sel-id]').forEach(e=>e.removeAttribute('data-rubika-sel-id'));

              // Collect all relevant elements (including inside shadow DOMs if any)
              function getElements(root) {
                const selectors = 'a,button,input,select,textarea,summary,details,label,iframe,[onclick],'+
                  '[role="button"],[role="menuitem"],[role="option"],[role="tab"],[role="link"],'+
                  '[role="listbox"],[role="combobox"],[role="menu"],[role="menubar"],[role="treeitem"],'+
                  '[role="gridcell"],[role="row"],[role="switch"],[role="checkbox"],[role="radio"],[role="textbox"],'+
                  '[role="searchbox"],[role="spinbutton"],[role="slider"],[role="separator"],'+
                  '[role="dialog"],[role="alertdialog"],[aria-modal="true"],'+
                  '[tabindex]:not([tabindex="-1"]),[contenteditable="true"],'+
                  '.modal,.popup,.overlay,.dialog,.cookie-banner,[id*="cookie"],[class*="cookie"],'+
                  '[id*="consent"],[class*="consent"],[id*="notice"],[class*="notice"],'+
                  'div[role],span[role],li[role]';
                return Array.from(root.querySelectorAll(selectors));
              }

              let all = getElements(document);
              // Also search inside open shadow roots
              document.querySelectorAll('*').forEach(el => {
                if (el.shadowRoot) {
                  const inside = getElements(el.shadowRoot);
                  all = all.concat(inside);
                }
              });
              // Filter visible
              const visible = all.filter(el => {
                const rect = el.getBoundingClientRect();
                return rect.width>0 && rect.height>0 && rect.bottom>0 && rect.top<window.innerHeight && rect.right>0 && rect.left<window.innerWidth;
              });
              // Sort
              visible.sort((a,b)=>{
                const ra=a.getBoundingClientRect(), rb=b.getBoundingClientRect();
                if (Math.abs(ra.top-rb.top)<5) return ra.left-rb.left;
                return ra.top-rb.top;
              });
              // Label
              visible.forEach((el,idx)=>{
                const num=idx+1;
                el.setAttribute('data-rubika-sel-id', num);
                el.setAttribute('data-rubika-is-iframe', el.tagName==='IFRAME'?'1':'0');
                const rect=el.getBoundingClientRect();
                const overlay=document.createElement('div');
                overlay.className='rubika-hl-overlay';
                overlay.style.cssText=`position:fixed;top:${Math.max(0,rect.top)}px;left:${Math.max(0,rect.left)}px;width:${Math.min(rect.width,window.innerWidth-rect.left)}px;height:${Math.min(rect.height,window.innerHeight-rect.top)}px;background:${el.tagName==='IFRAME'?'rgba(0,255,0,0.15)':'rgba(255,0,0,0.1)'};border:2px dashed ${el.tagName==='IFRAME'?'#0f0':'#f00'};z-index:999996;pointer-events:none;`;
                document.body.appendChild(overlay);
                const badge=document.createElement('div');
                badge.className='rubika-hl-badge';
                badge.style.cssText=`position:fixed;top:${Math.max(2,rect.top-6)}px;left:${Math.max(2,rect.left-6)}px;background:black;color:white;border-radius:50%;width:20px;height:20px;font-size:11px;line-height:20px;text-align:center;font-weight:bold;z-index:999999;pointer-events:none;`;
                badge.textContent=num;
                document.body.appendChild(badge);
              });
              return visible.length;
            });
          }

          async function removeHighlights(page) {
            await safeEvaluate(page, ()=>{
              document.querySelectorAll('.rubika-hl-badge,.rubika-hl-overlay').forEach(e=>e.remove());
              document.querySelectorAll('[data-rubika-sel-id]').forEach(e=>e.removeAttribute('data-rubika-sel-id'));
              document.querySelectorAll('[data-rubika-is-iframe]').forEach(e=>e.removeAttribute('data-rubika-is-iframe'));
            });
          }

          async function clickByNumber(page, num) {
            try {
              const info = await safeEvaluate(page, (n)=>{
                const el = document.querySelector(`[data-rubika-sel-id="${n}"]`);
                if (!el) return null;
                el.scrollIntoView({block:'center',inline:'center'});
                el.focus({preventScroll:true});
                const rect = el.getBoundingClientRect();
                return { tag:el.tagName, iframe:el.getAttribute('data-rubika-is-iframe')==='1', x:rect.x+rect.width/2, y:rect.y+rect.height/2 };
              }, num);
              if (!info) return false;
              const navP = page.waitForNavigation({waitUntil:'networkidle2',timeout:5000}).catch(()=>null);
              if (info.tag==='IFRAME' || info.iframe) {
                await page.mouse.click(info.x, info.y);
              } else {
                await safeEvaluate(page, (n)=>{ const el=document.querySelector(`[data-rubika-sel-id="${n}"]`); if(el) el.click(); }, num);
              }
              await navP;
              await sleep(800);
              return true;
            } catch(e) { await sleep(1500); return true; }
          }

          // ------------------ Keypad ------------------
          function buildKeypad() {
            return {
              rows: [
                [{ id:"SELECT", type:"Simple", button_text:"🔍 انتخاب شماره‌ها" }],
                [{ id:"TYPE", type:"Simple", button_text:"⌨️ تایپ" }],
                [{ id:"ENTER", type:"Simple", button_text:"↵ Enter" }],
                [{ id:"SCREENSHOT", type:"Simple", button_text:"📸 اسکرین‌شات" }],
                [{ id:"REFRESH", type:"Simple", button_text:"🔄 رفرش صفحه" }],
                [{ id:"CHANGE_PROXY", type:"Simple", button_text:"🔁 عوض کردن پروکسی" }]
              ],
              resize_keyboard: true, one_time_keyboard: false
            };
          }

          // ------------------ State ------------------
          const chatStates = new Map();
          function getState(chatId) {
            if (!chatStates.has(chatId)) chatStates.set(chatId, { typing:false, selecting:false, lastShotId:null, tempMsgs:[] });
            return chatStates.get(chatId);
          }
          async function deleteTempMessages(chatId) {
            const st = getState(chatId);
            for (const id of st.tempMsgs) try { await deleteMessage(chatId, id); } catch(e){}
            st.tempMsgs = [];
          }

          async function updateScreenshot(page, chatId) {
            const st = getState(chatId);
            const shotPath = `/tmp/shot_${chatId}_${Date.now()}.png`;
            await page.screenshot({ path:shotPath, fullPage:false });
            if (st.lastShotId) try { await deleteMessage(chatId, st.lastShotId); } catch(e){}
            const keypad = buildKeypad();
            const newId = await uploadAndSendFile(chatId, shotPath, 'Image', keypad);
            if (newId) st.lastShotId = newId;
            try { fs.unlinkSync(shotPath); } catch(e){}
          }

          // ------------------ Main flow ------------------
          (async ()=>{
            try {
              // Validate bot
              const me = await api('getMe');
              if (!me?.data?.bot?.username) { err('Invalid token'); process.exit(1); }
              log('✅ Bot:', me.data.bot.username);

              // Load proxies
              if (!fs.existsSync(PROXY_FILE)) { err('No proxy file'); process.exit(1); }
              const proxies = fs.readFileSync(PROXY_FILE,'utf8').split('\n').map(l=>l.trim()).filter(l=>/^(vless|trojan|ss|vmess):\/\//.test(l));
              if (proxies.length===0) { err('Zero proxies'); process.exit(1); }
              log(`${proxies.length} good proxies loaded.`);

              let browser=null, page=null, xrayProc=null;
              let curProxyIdx = -1;                     // index in proxies array
              let proxyFound = false;

              // ---------- Helper to start browser with proxy at given index ----------
              async function startBrowserWithProxy(idx) {
                // Kill previous
                if (xrayProc) { xrayProc.kill(); await sleep(500); }
                if (browser) { try { await browser.close(); } catch(e){} }

                const uri = proxies[idx];
                log(`🔌 Trying proxy #${idx+1}: ${uri.substring(0,60)}...`);
                xrayProc = await startXray(uri, idx);
                if (!xrayProc) throw new Error('Xray start failed');
                if (!testCurl(10808)) throw new Error('Curl failed');

                browser = await puppeteer.launch({
                  headless:'new',
                  args: ['--no-sandbox','--disable-setuid-sandbox','--proxy-server=socks5://127.0.0.1:10808','--disable-dev-shm-usage','--window-size=1280,720'],
                  defaultViewport:null
                });
                page = await browser.newPage();
                await page.setViewport({width:1280,height:720,deviceScaleFactor:1});
                await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/125.0.0.0');
              }

              // Find first working proxy
              for (let i=0; i<proxies.length; i++) {
                try {
                  await startBrowserWithProxy(i);
                  await page.goto(TARGET_URL, {waitUntil:'networkidle2',timeout:30000});
                  await sleep(2000);
                  if (await isPageBlocked(page)) {
                    log('⛔ Block page detected for this proxy.');
                    continue;
                  }
                  proxyFound = true;
                  curProxyIdx = i;
                  log('✅ Connected with working proxy.');
                  break;
                } catch(e) {
                  err('Failed trying this proxy:', e.message);
                }
              }
              if (!proxyFound) { err('No working proxy found'); process.exit(1); }

              // Notify owner
              if (OWNER) await sendMessage(OWNER, '🟢 Bot ready on Groq with good proxy.');
              else log('⚠️ No owner chat id.');

              // Purge old updates
              let offset=null;
              while(true){
                const r = await api('getUpdates', offset?{limit:10,offset_id:offset}:{limit:10});
                if (r.error) break;
                const ups = r?.data?.updates;
                if (!ups||ups.length===0) break;
                if (r.data?.next_offset_id) offset=r.data.next_offset_id; else break;
              }
              if (OWNER) await updateScreenshot(page, OWNER);

              let consecutiveErrors=0;
              const END_TIME = Date.now() + 17380*1000;

              while (Date.now()<END_TIME) {
                try {
                  const params = { limit:10 };
                  if (offset!==null) params.offset_id = offset;
                  const upRes = await api('getUpdates', params);
                  if (upRes.error) {
                    consecutiveErrors++;
                    if (consecutiveErrors>=3) { offset=null; consecutiveErrors=0; }
                    await sleep(5000);
                    continue;
                  }
                  consecutiveErrors=0;
                  const updates = upRes?.data?.updates;

                  if (updates?.length) {
                    for (const upd of updates) {
                      if (upd.type!=='NewMessage') continue;
                      const chatId = upd.chat_id;
                      const msg = upd.new_message;
                      if (!msg) continue;

                      const state = getState(chatId);
                      const btnId = msg.aux_data?.button_id;
                      const text = (msg.text||'').trim();

                      await deleteTempMessages(chatId);

                      if (btnId) {
                        log(`🔘 ${btnId} from ${chatId}`);
                        state.typing=false; state.selecting=false;

                        switch(btnId) {
                          case 'SELECT':
                            state.selecting=true;
                            const cnt = await highlightClickableElements(page);
                            if (cnt===0) { await sendMessage(chatId,'⚠️ No elements found.'); state.selecting=false; continue; }
                            await updateScreenshot(page, chatId);
                            const m = await sendMessage(chatId, `🔢 ${cnt} elements (including popups/cookies) tagged. Send number.`);
                            if (m?.data?.message_id) state.tempMsgs.push(m.data.message_id);
                            break;
                          case 'TYPE':
                            state.typing=true;
                            const tm = await sendMessage(chatId, '⌨️ Send text:');
                            if (tm?.data?.message_id) state.tempMsgs.push(tm.data.message_id);
                            break;
                          case 'ENTER':
                            await page.keyboard.press('Enter');
                            await page.waitForNavigation({waitUntil:'networkidle2',timeout:3000}).catch(()=>{});
                            await sleep(800);
                            await updateScreenshot(page, chatId);
                            break;
                          case 'SCREENSHOT':
                            await updateScreenshot(page, chatId);
                            break;
                          case 'REFRESH':
                            await page.reload({waitUntil:'networkidle2',timeout:30000});
                            await sleep(1000);
                            // check if blocked after refresh
                            if (await isPageBlocked(page)) {
                              await sendMessage(chatId, '⚠️ Page blocked after refresh. Try changing proxy.');
                            }
                            await updateScreenshot(page, chatId);
                            break;
                          case 'CHANGE_PROXY':
                            // switch to next proxy
                            curProxyIdx = (curProxyIdx+1) % proxies.length;
                            let success = false;
                            for (let attempts=0; attempts<proxies.length; attempts++) {
                              try {
                                await startBrowserWithProxy(curProxyIdx);
                                await page.goto(TARGET_URL, {waitUntil:'networkidle2',timeout:30000});
                                await sleep(2000);
                                if (await isPageBlocked(page)) {
                                  log('Proxy still blocked, trying next...');
                                  curProxyIdx = (curProxyIdx+1) % proxies.length;
                                  continue;
                                }
                                success = true;
                                break;
                              } catch(e) {
                                log('Error with proxy, next...');
                                curProxyIdx = (curProxyIdx+1) % proxies.length;
                              }
                            }
                            if (success) {
                              await sendMessage(chatId, `🔁 Switched to proxy #${curProxyIdx+1}`);
                              await updateScreenshot(page, chatId);
                            } else {
                              await sendMessage(chatId, '❌ No working proxy found.');
                              process.exit(1);
                            }
                            break;
                        }
                      }
                      // Text inputs
                      else if (state.selecting && text) {
                        const num = parseInt(text);
                        if (isNaN(num)||num<=0) {
                          const em=await sendMessage(chatId,'❌ Invalid number.');
                          if (em?.data?.message_id) state.tempMsgs.push(em.data.message_id);
                          continue;
                        }
                        await clickByNumber(page, num);
                        await removeHighlights(page);
                        state.selecting=false;
                        await sleep(300);
                        await updateScreenshot(page, chatId);
                      }
                      else if (state.typing && text) {
                        state.typing=false;
                        await page.keyboard.type(text, {delay:50});
                        await sleep(300);
                        await updateScreenshot(page, chatId);
                      }
                      else if (text==='/start') {
                        await sendMessage(chatId, '🟢 Groq bot ready.');
                        if (!state.lastShotId) await updateScreenshot(page, chatId);
                      }
                    }
                    if (upRes.data?.next_offset_id) offset = upRes.data.next_offset_id;
                  }
                } catch(e) {
                  err('Main loop error:', e.message);
                  await sleep(5000);
                }
                await sleep(4000);
              }

              log('⏰ Auto shutdown.');
              if (browser) await browser.close();
              if (xrayProc) xrayProc.kill();
              if (OWNER) await sendMessage(OWNER, '⏹️ Bot stopped.');
            } catch(fatal) {
              err('FATAL:', fatal.message);
              process.exit(1);
            }
          })();
          ENDSCRIPT

          timeout 17400 node agent.cjs
