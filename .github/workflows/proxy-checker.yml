name: 🧹 استخراج کانفیگ‌های خوب از اسکرین‌شات‌ها

on:
  workflow_dispatch:        # دستی اجرا کن
  schedule:
    - cron: '30 */6 * * *'  # نیم ساعت بعد از تست اصلی (اختیاری)

jobs:
  extract-good-proxies:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: 📥 دریافت ریپو
        uses: actions/checkout@v4

      - name: 🧠 پردازش اسکرین‌شات‌ها و ساخت فایل کانفیگ‌های خوب
        run: |
          cat > extract.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const SCREENSHOT_DIR = 'groq_screenshots';
          const PROXIES_FILE = 'proxies.txt';
          const OUTPUT_FILE = 'کانفیگ های خوب.txt';

          if (!fs.existsSync(PROXIES_FILE)) {
            console.error('❌ proxies.txt پیدا نشد.');
            process.exit(1);
          }

          const proxies = fs.readFileSync(PROXIES_FILE, 'utf8')
            .split('\n')
            .map(l => l.trim())
            .filter(l => l.length > 0 && (l.startsWith('vless://') || l.startsWith('trojan://') || l.startsWith('ss://') || l.startsWith('vmess://')));

          if (!fs.existsSync(SCREENSHOT_DIR)) {
            console.error('❌ پوشه groq_screenshots وجود ندارد.');
            process.exit(1);
          }

          const files = fs.readdirSync(SCREENSHOT_DIR);

          // فایل‌های موفق: proxy_NUMBER.png
          const successIndices = new Set();
          files.forEach(file => {
            const match = file.match(/^proxy_(\d+)\.png$/);
            if (match) {
              const index = parseInt(match[1]) - 1; // چون از ۱ شروع کردیم
              if (index >= 0 && index < proxies.length) {
                successIndices.add(index);
              }
            }
          });

          if (successIndices.size === 0) {
            console.log('⚠️ هیچ اسکرین‌شات موفقی پیدا نشد.');
            // فایل خالی هم می‌نویسیم که وضعیت مشخص باشه
            fs.writeFileSync(OUTPUT_FILE, '');
          } else {
            const goodProxies = [];
            successIndices.forEach(idx => {
              goodProxies.push(proxies[idx]);
            });
            fs.writeFileSync(OUTPUT_FILE, goodProxies.join('\n') + '\n');
            console.log(`✅ ${goodProxies.length} کانفیگ خوب در فایل ذخیره شد.`);
          }
          EOF

          node extract.js

      - name: 📤 کامیت فایل کانفیگ‌های خوب
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "کانفیگ های خوب.txt"
          git commit -m "📋 استخراج کانفیگ‌های موفق از Groq - $(date +'%Y-%m-%d %H:%M')" || echo "بدون تغییر"
          git push
