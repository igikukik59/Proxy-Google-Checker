name: 🌐 مرورگر راه دور (جستجوی متنی + انتخاب هوشمند)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  remote-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🧰 نصب ابزارها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y curl unzip
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d xray && chmod +x xray/xray
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: 🤖 اجرای ربات (نسخه نهایی با جستجوی متنی)
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          RUBIKA_OWNER_CHAT_ID: ${{ secrets.RUBIKA_OWNER_CHAT_ID }}
        run: |
          cat > agent.cjs << 'ENDSCRIPT'
          const { spawn } = require('child_process');
          const fs = require('fs');
          const path = require('path');
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());

          function ts() { return new Date().toISOString().replace('T',' ').substring(0,19); }
          function log(...args) { console.log(`[${ts()}]`, ...args); }
          function err(...args) { console.error(`[${ts()}] ❌`, ...args); }

          // ======================== Xray Helpers ========================
          function parseURI(uri) {
            try {
              const u = new URL(uri);
              return {
                protocol: u.protocol.replace(':',''),
                uuid: u.username,
                address: u.hostname,
                port: u.port,
                params: Object.fromEntries(u.searchParams.entries())
              };
            } catch(e) { return null; }
          }

          function generateXrayConfig(uri) {
            const p = parseURI(uri);
            if (!p) return null;
            const inbound = { port: 10808, protocol: 'socks', settings: { auth: 'noauth', udp: true } };
            let outbound = {
              protocol: p.protocol,
              settings: p.protocol === 'trojan' ? {
                servers: [{ address: p.address, port: parseInt(p.port), password: p.uuid }]
              } : {
                vnext: [{ address: p.address, port: parseInt(p.port), users: [{ id: p.uuid, encryption: p.params.encryption || 'none', flow: p.params.flow || '' }] }]
              },
              streamSettings: { network: p.params.type || 'tcp' }
            };
            const network = p.params.type || 'tcp';
            outbound.streamSettings.network = network;
            if (network === 'ws') {
              outbound.streamSettings.wsSettings = {
                path: p.params.path || '/',
                headers: p.params.host ? { Host: p.params.host } : {}
              };
            }
            const security = p.params.security || 'none';
            if (security === 'tls' || security === 'reality') {
              outbound.streamSettings.security = security;
              const tls = { serverName: p.params.sni || p.address };
              if (security === 'reality') {
                tls.fingerprint = p.params.fp || 'chrome';
                tls.publicKey = p.params.pbk || '';
                tls.shortId = p.params.sid || '';
                tls.spiderX = '';
              }
              if (p.params.allowInsecure === '1') tls.allowInsecure = true;
              if (p.params.alpn) tls.alpn = p.params.alpn.split(',');
              outbound.streamSettings.tlsSettings = tls;
            } else {
              outbound.streamSettings.security = 'none';
            }
            return { inbounds: [inbound], outbounds: [outbound] };
          }

          async function startXray(uri, idx) {
            const config = generateXrayConfig(uri);
            if (!config) return null;
            const cfgPath = `/tmp/xray_${idx}.json`;
            fs.writeFileSync(cfgPath, JSON.stringify(config, null, 2));
            const xray = spawn(path.join(process.cwd(), 'xray', 'xray'), ['run', '-config', cfgPath], { stdio: 'pipe' });
            await new Promise(r => setTimeout(r, 4000));
            return xray;
          }

          function testCurl(port) {
            try {
              require('child_process').execSync(`curl --socks5 127.0.0.1:${port} --max-time 5 -s http://ip-api.com/json`, { encoding: 'utf8' });
              return true;
            } catch(e) { return false; }
          }

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // ======================== Rubika API ========================
          const TOKEN = process.env.RUBIKA_BOT_TOKEN;
          const OWNER = process.env.RUBIKA_OWNER_CHAT_ID || '';
          const BASE = `https://botapi.rubika.ir/v3/${TOKEN}`;

          async function api(method, body = {}) {
            const url = `${BASE}/${method}`;
            try {
              const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(body)
              });
              const text = await res.text();
              let data;
              try { data = JSON.parse(text); } catch(e) {
                err(`⚠️ پاسخ ${method} JSON نیست:`, text.substring(0, 300));
                return { error: true, raw: text };
              }
              return data;
            } catch(e) {
              err(`🚨 خطای شبکه در ${method}:`, e.message);
              return { error: true, message: e.message };
            }
          }

          async function sendMessage(chatId, text, extra = {}) {
            return await api('sendMessage', { chat_id: chatId, text, ...extra });
          }

          async function deleteMessage(chatId, messageId) {
            if (!messageId) return;
            return await api('deleteMessage', { chat_id: chatId, message_id: messageId });
          }

          async function uploadAndSendFile(chatId, filePath, fileType, keypad = null) {
            const reqRes = await api('requestSendFile', { type: fileType });
            const uploadUrl = reqRes?.data?.upload_url;
            if (!uploadUrl) { err('upload_url دریافت نشد'); return null; }

            const buf = fs.readFileSync(filePath);
            const form = new FormData();
            form.append('file', new Blob([buf], { type: 'application/octet-stream' }), path.basename(filePath));

            const upRes = await fetch(uploadUrl, { method: 'POST', body: form });
            const upText = await upRes.text();
            let upJson = {};
            try { upJson = JSON.parse(upText); } catch(e) {}
            const fileId = upJson?.file_id || upJson?.data?.file_id;
            if (!fileId) { err('file_id یافت نشد'); return null; }

            const sendBody = { chat_id: chatId, file_id: fileId, text: '' };
            if (keypad) {
              sendBody.chat_keypad = keypad;
              sendBody.chat_keypad_type = 'New';
            }
            const sendRes = await api('sendFile', sendBody);
            return sendRes?.data?.message_id || null;
          }

          // ======================== نشانگر نقطه‌ای قرمز ========================
          async function injectFakeCursor(page) {
            await page.evaluate(() => {
              if (document.getElementById('fake-cursor')) return;
              const cur = document.createElement('div');
              cur.id = 'fake-cursor';
              cur.style.position = 'fixed';
              cur.style.top = '0';
              cur.style.left = '0';
              cur.style.width = '10px';
              cur.style.height = '10px';
              cur.style.background = 'rgba(255,0,0,0.8)';
              cur.style.border = '1px solid rgba(255,255,255,0.9)';
              cur.style.borderRadius = '50%';
              cur.style.zIndex = '999998';
              cur.style.pointerEvents = 'none';
              document.body.appendChild(cur);

              const lbl = document.createElement('div');
              lbl.id = 'cursor-label';
              lbl.style.position = 'fixed';
              lbl.style.top = '15px';
              lbl.style.left = '15px';
              lbl.style.color = 'black';
              lbl.style.background = 'rgba(255,255,255,0.8)';
              lbl.style.padding = '1px 4px';
              lbl.style.borderRadius = '3px';
              lbl.style.fontSize = '11px';
              lbl.style.zIndex = '999998';
              lbl.style.pointerEvents = 'none';
              lbl.textContent = '0,0';
              document.body.appendChild(lbl);
            });
          }

          async function moveCursorTo(page, x, y) {
            await page.evaluate(({x, y}) => {
              const cur = document.getElementById('fake-cursor');
              const lbl = document.getElementById('cursor-label');
              if (cur) {
                cur.style.top = (y - 5) + 'px';
                cur.style.left = (x - 5) + 'px';
              }
              if (lbl) {
                lbl.textContent = `${x},${y}`;
                lbl.style.top = (y + 8) + 'px';
                lbl.style.left = (x + 8) + 'px';
              }
            }, {x, y});
          }

          // ======================== انتخاب هوشمند با شماره (تصویری) ========================
          async function highlightClickableElements(page) {
            return await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-sel-id]').forEach(el => el.removeAttribute('data-rubika-sel-id'));

              const selectors = [
                'a', 'button', 'input', 'select', 'textarea', 'area', 'summary', 'details', 'label',
                '[onclick]',
                '[role="button"]', '[role="menuitem"]', '[role="option"]', '[role="tab"]',
                '[role="link"]', '[role="listbox"]', '[role="combobox"]', '[role="menu"]',
                '[role="menubar"]', '[role="treeitem"]', '[role="gridcell"]', '[role="row"]',
                '[role="switch"]', '[role="checkbox"]', '[role="radio"]', '[role="textbox"]',
                '[role="searchbox"]', '[role="spinbutton"]', '[role="slider"]', '[role="separator"]',
                '[tabindex]:not([tabindex="-1"])', '[contenteditable="true"]',
                'div[role]', 'span[role]', 'li[role]'
              ];

              const all = document.querySelectorAll(selectors.join(','));
              const visible = [];
              all.forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0 &&
                    rect.bottom > 0 && rect.top < window.innerHeight &&
                    rect.right > 0 && rect.left < window.innerWidth) {
                  visible.push({el, rect});
                }
              });

              visible.sort((a,b) => {
                if (Math.abs(a.rect.top - b.rect.top) < 5) return a.rect.left - b.rect.left;
                return a.rect.top - b.rect.top;
              });

              visible.forEach(({el, rect}, idx) => {
                const num = idx + 1;
                el.setAttribute('data-rubika-sel-id', num);

                const overlay = document.createElement('div');
                overlay.className = 'rubika-hl-overlay';
                overlay.style.position = 'fixed';
                overlay.style.top = Math.max(0, rect.top) + 'px';
                overlay.style.left = Math.max(0, rect.left) + 'px';
                overlay.style.width = Math.min(rect.width, window.innerWidth - rect.left) + 'px';
                overlay.style.height = Math.min(rect.height, window.innerHeight - rect.top) + 'px';
                overlay.style.background = 'rgba(255,0,0,0.1)';
                overlay.style.border = '2px dashed red';
                overlay.style.zIndex = '999996';
                overlay.style.pointerEvents = 'none';
                overlay.style.boxSizing = 'border-box';
                document.body.appendChild(overlay);

                const badge = document.createElement('div');
                badge.className = 'rubika-hl-badge';
                badge.style.position = 'fixed';
                badge.style.top = Math.max(2, rect.top - 6) + 'px';
                badge.style.left = Math.max(2, rect.left - 6) + 'px';
                badge.style.background = 'black';
                badge.style.color = 'white';
                badge.style.borderRadius = '50%';
                badge.style.width = '20px';
                badge.style.height = '20px';
                badge.style.fontSize = '11px';
                badge.style.lineHeight = '20px';
                badge.style.textAlign = 'center';
                badge.style.fontWeight = 'bold';
                badge.style.zIndex = '999999';
                badge.style.pointerEvents = 'none';
                badge.style.boxShadow = '0 0 4px rgba(0,0,0,0.5)';
                badge.textContent = num;
                document.body.appendChild(badge);
              });

              return visible.length;
            });
          }

          async function removeHighlights(page) {
            await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-sel-id]').forEach(el => el.removeAttribute('data-rubika-sel-id'));
            });
          }

          async function clickByNumber(page, number) {
            try {
              const found = await page.evaluate((num) => {
                const el = document.querySelector(`[data-rubika-sel-id="${num}"]`);
                if (!el) return false;
                el.scrollIntoView({ block: 'center', inline: 'center' });
                el.focus({ preventScroll: true });
                return true;
              }, number);
              if (!found) return false;

              const navigationPromise = page.waitForNavigation({ waitUntil: 'networkidle2', timeout: 3000 }).catch(() => null);
              await page.evaluate((num) => {
                const el = document.querySelector(`[data-rubika-sel-id="${num}"]`);
                if (el) el.click();
              }, number);
              await navigationPromise;
              await sleep(500);
              return true;
            } catch(e) {
              log('⚠️ مدیریت ناوبری پس از کلیک (element click)');
              await sleep(2000);
              return true;
            }
          }

          // ======================== جستجوی متنی ========================
          // پیدا کردن عناصر بر اساس متن و نمایش لیست شماره‌گذاری‌شده
          async function searchByText(page, query) {
            return await page.evaluate((q) => {
              const lowerQ = q.toLowerCase();
              const selectors = [
                'a', 'button', 'input', 'select', 'textarea', 'area', 'summary', 'details', 'label',
                '[onclick]',
                '[role="button"]', '[role="menuitem"]', '[role="option"]', '[role="tab"]',
                '[role="link"]', '[role="listbox"]', '[role="combobox"]', '[role="menu"]',
                '[role="menubar"]', '[role="treeitem"]', '[role="gridcell"]', '[role="row"]',
                '[role="switch"]', '[role="checkbox"]', '[role="radio"]', '[role="textbox"]',
                '[role="searchbox"]', '[role="spinbutton"]', '[role="slider"]', '[role="separator"]',
                '[tabindex]:not([tabindex="-1"])', '[contenteditable="true"]',
                'div[role]', 'span[role]', 'li[role]'
              ];

              const all = document.querySelectorAll(selectors.join(','));
              const matched = [];

              all.forEach(el => {
                const text = (el.textContent || '').trim();
                const value = (el.value || '').trim();
                const placeholder = (el.placeholder || '').trim();
                const ariaLabel = (el.getAttribute('aria-label') || '').trim();
                const combined = [text, value, placeholder, ariaLabel].join(' ').toLowerCase();
                if (combined.includes(lowerQ)) {
                  // ذخیره موقت ایندکس برای استفاده بعدی
                  matched.push({
                    index: matched.length,
                    tag: el.tagName.toLowerCase(),
                    text: text.substring(0, 80),
                    id: el.id || '',
                    className: (el.className && typeof el.className === 'string') ? el.className.substring(0, 60) : ''
                  });
                  // علامت‌گذاری با یک attribute
                  el.setAttribute('data-rubika-search-id', matched.length - 1);
                }
              });

              return matched.map(m => ({
                index: m.index + 1,
                tag: m.tag,
                text: m.text,
                id: m.id,
                className: m.className
              }));
            }, query);
          }

          async function clickBySearchIndex(page, index) {
            try {
              const found = await page.evaluate((idx) => {
                const el = document.querySelector(`[data-rubika-search-id="${idx}"]`);
                if (!el) return false;
                el.scrollIntoView({ block: 'center', inline: 'center' });
                el.focus({ preventScroll: true });
                return true;
              }, index);
              if (!found) return false;

              const navigationPromise = page.waitForNavigation({ waitUntil: 'networkidle2', timeout: 3000 }).catch(() => null);
              await page.evaluate((idx) => {
                const el = document.querySelector(`[data-rubika-search-id="${idx}"]`);
                if (el) el.click();
              }, index);
              await navigationPromise;
              await sleep(500);
              // پاکسازی attribute های جستجو
              await page.evaluate(() => {
                document.querySelectorAll('[data-rubika-search-id]').forEach(el => el.removeAttribute('data-rubika-search-id'));
              });
              return true;
            } catch(e) {
              log('⚠️ مدیریت ناوبری پس از کلیک (text search)');
              await page.evaluate(() => {
                document.querySelectorAll('[data-rubika-search-id]').forEach(el => el.removeAttribute('data-rubika-search-id'));
              });
              await sleep(2000);
              return true;
            }
          }

          // ======================== کی‌پد کنترلی ========================
          function buildControlKeypad() {
            return {
              rows: [
                { buttons: [{ id: "UP",     type: "Simple", button_text: "⬆️" }] },
                { buttons: [
                    { id: "LEFT",   type: "Simple", button_text: "⬅️" },
                    { id: "CENTER", type: "Simple", button_text: "🏠 وسط" },
                    { id: "RIGHT",  type: "Simple", button_text: "➡️" }
                ]},
                { buttons: [{ id: "DOWN",   type: "Simple", button_text: "⬇️" }] },
                { buttons: [
                    { id: "SCROLL_UP",   type: "Simple", button_text: "⬆️ اسکرول بالا" },
                    { id: "SCROLL_DOWN", type: "Simple", button_text: "⬇️ اسکرول پایین" }
                ]},
                { buttons: [
                    { id: "CLICK",       type: "Simple", button_text: "🖱️ کلیک" },
                    { id: "DBL_CLICK",   type: "Simple", button_text: "🔁 دبل کلیک" },
                    { id: "RIGHT_CLICK", type: "Simple", button_text: "🖱️ راست کلیک" }
                ]},
                { buttons: [
                    { id: "TYPE",        type: "Simple", button_text: "⌨️ تایپ" },
                    { id: "GO_URL",      type: "Simple", button_text: "🌐 آدرس جدید" }
                ]},
                { buttons: [
                    { id: "SELECT",      type: "Simple", button_text: "🔍 انتخاب با شماره" },
                    { id: "SEARCH",      type: "Simple", button_text: "🔎 جستجوی متن" }
                ]},
                { buttons: [
                    { id: "ENTER",       type: "Simple", button_text: "↵ Enter" },
                    { id: "SCREENSHOT",  type: "Simple", button_text: "📸 اسکرین‌شات" }
                ]}
              ],
              resize_keyboard: true,
              one_time_keyboard: false
            };
          }

          // ======================== مدیریت حالت ========================
          const chatStates = new Map();
          function getState(chatId) {
            if (!chatStates.has(chatId)) {
              chatStates.set(chatId, {
                cursorX: 0,
                cursorY: 0,
                typingMode: false,
                urlMode: false,
                moveMode: null,
                scrollMode: null,
                selectionMode: false,
                searchMode: false,
                searchResults: [],       // ذخیره نتایج جستجو برای انتخاب
                lastScreenshotMsgId: null,
                tempMessageIds: []
              });
            }
            return chatStates.get(chatId);
          }

          async function deleteTempMessages(chatId) {
            const state = getState(chatId);
            for (const msgId of state.tempMessageIds) {
              try { await deleteMessage(chatId, msgId); } catch(e) {}
            }
            state.tempMessageIds = [];
          }

          // ======================== ارسال اسکرین‌شات جدید ========================
          async function updateScreenshot(page, chatId) {
            const state = getState(chatId);
            await injectFakeCursor(page);
            await moveCursorTo(page, state.cursorX, state.cursorY);

            const shotPath = `/tmp/shot_${chatId}_${Date.now()}.png`;
            await page.screenshot({ path: shotPath, fullPage: false });

            if (state.lastScreenshotMsgId) {
              try { await deleteMessage(chatId, state.lastScreenshotMsgId); } catch(e) {}
            }

            const keypad = buildControlKeypad();
            const newMsgId = await uploadAndSendFile(chatId, shotPath, 'Image', keypad);
            if (newMsgId) {
              state.lastScreenshotMsgId = newMsgId;
            }
            try { fs.unlinkSync(shotPath); } catch(e) {}
          }

          // ======================== پردازش دکمه‌ها ========================
          const MAX_X = 1280;
          const MAX_Y = 720;

          async function handleButton(page, chatId, buttonId) {
            const state = getState(chatId);
            // بازنشانی حالت‌های موقت
            state.typingMode = false;
            state.urlMode = false;
            state.moveMode = null;
            state.scrollMode = null;
            state.selectionMode = false;
            state.searchMode = false;
            state.searchResults = [];

            switch(buttonId) {
              case 'UP':
                state.moveMode = 'up';
                await sendMessage(chatId, '⬆️ چند پیکسل به بالا حرکت کنم؟ (عدد مثبت)');
                return;
              case 'DOWN':
                state.moveMode = 'down';
                await sendMessage(chatId, '⬇️ چند پیکسل به پایین حرکت کنم؟ (عدد مثبت)');
                return;
              case 'LEFT':
                state.moveMode = 'left';
                await sendMessage(chatId, '⬅️ چند پیکسل به چپ حرکت کنم؟ (عدد مثبت)');
                return;
              case 'RIGHT':
                state.moveMode = 'right';
                await sendMessage(chatId, '➡️ چند پیکسل به راست حرکت کنم؟ (عدد مثبت)');
                return;
              case 'CENTER':
                state.cursorX = 640;
                state.cursorY = 360;
                break;
              case 'SCROLL_UP':
                state.scrollMode = 'up';
                await sendMessage(chatId, '⬆️ چند پیکسل به بالا اسکرول کنم؟ (عدد مثبت)');
                return;
              case 'SCROLL_DOWN':
                state.scrollMode = 'down';
                await sendMessage(chatId, '⬇️ چند پیکسل به پایین اسکرول کنم؟ (عدد مثبت)');
                return;
              case 'CLICK':
                await page.mouse.move(state.cursorX, state.cursorY);
                await page.mouse.click(state.cursorX, state.cursorY);
                break;
              case 'RIGHT_CLICK':
                await page.mouse.move(state.cursorX, state.cursorY);
                await page.mouse.click(state.cursorX, state.cursorY, { button: 'right' });
                break;
              case 'DBL_CLICK':
                await page.mouse.move(state.cursorX, state.cursorY);
                await page.mouse.click(state.cursorX, state.cursorY, { clickCount: 2 });
                break;
              case 'TYPE':
                state.typingMode = true;
                await sendMessage(chatId, '⌨️ متن مورد نظر را ارسال کنید:');
                return;
              case 'GO_URL':
                state.urlMode = true;
                await sendMessage(chatId, '🌐 آدرس کامل (مثل https://google.com) را ارسال کنید:');
                return;
              case 'SELECT':
                state.selectionMode = true;
                const count = await highlightClickableElements(page);
                if (count === 0) {
                  await sendMessage(chatId, '⚠️ هیچ عنصر قابل کلیکی در صفحه یافت نشد.');
                  state.selectionMode = false;
                  return;
                }
                const shotPath = `/tmp/sel_${chatId}_${Date.now()}.png`;
                await injectFakeCursor(page);
                await moveCursorTo(page, state.cursorX, state.cursorY);
                await page.screenshot({ path: shotPath, fullPage: false });
                if (state.lastScreenshotMsgId) {
                  try { await deleteMessage(chatId, state.lastScreenshotMsgId); } catch(e) {}
                }
                const keypad = buildControlKeypad();
                const newMsgId = await uploadAndSendFile(chatId, shotPath, 'Image', keypad);
                if (newMsgId) state.lastScreenshotMsgId = newMsgId;
                try { fs.unlinkSync(shotPath); } catch(e) {}
                await sendMessage(chatId, `🔢 ${count} عنصر نشانه‌گذاری شد. شماره را وارد کنید.`);
                return;
              case 'SEARCH':
                state.searchMode = true;
                await sendMessage(chatId, '🔎 چه متنی را جستجو کنم؟ (مثلاً Images)');
                return;
              case 'ENTER':
                try {
                  const navPromise = page.waitForNavigation({ waitUntil: 'networkidle2', timeout: 3000 }).catch(() => null);
                  await page.keyboard.press('Enter');
                  await navPromise;
                  await sleep(1000);
                } catch(e) {
                  log('⚠️ مدیریت ناوبری پس از Enter');
                  await sleep(1500);
                }
                break;
              case 'SCREENSHOT':
                break;
            }
            await updateScreenshot(page, chatId);
          }

          // ======================== پردازش ورودی‌های متنی ========================
          async function handleMoveInput(page, chatId, amountText) {
            const state = getState(chatId);
            const amount = parseInt(amountText);
            if (isNaN(amount) || amount <= 0) {
              const msg = await sendMessage(chatId, '❌ لطفاً یک عدد مثبت وارد کنید.');
              state.tempMessageIds.push(msg?.data?.message_id);
              state.moveMode = null;
              return;
            }

            let newX = state.cursorX, newY = state.cursorY;
            switch(state.moveMode) {
              case 'up':    newY = Math.max(0, state.cursorY - amount); break;
              case 'down':  newY = Math.min(MAX_Y, state.cursorY + amount); break;
              case 'left':  newX = Math.max(0, state.cursorX - amount); break;
              case 'right': newX = Math.min(MAX_X, state.cursorX + amount); break;
            }
            state.cursorX = newX;
            state.cursorY = newY;
            state.moveMode = null;

            const msg = await sendMessage(chatId, `✅ حرکت به (${newX},${newY})`);
            state.tempMessageIds.push(msg?.data?.message_id);
            await updateScreenshot(page, chatId);
          }

          async function handleScrollInput(page, chatId, amountText) {
            const state = getState(chatId);
            const amount = parseInt(amountText);
            if (isNaN(amount) || amount <= 0) {
              const msg = await sendMessage(chatId, '❌ لطفاً یک عدد مثبت وارد کنید.');
              state.tempMessageIds.push(msg?.data?.message_id);
              state.scrollMode = null;
              return;
            }

            const sign = state.scrollMode === 'up' ? -1 : 1;
            await page.evaluate(({sign, amount}) => {
              window.scrollBy(0, sign * amount);
            }, {sign, amount});
            await sleep(300);
            state.scrollMode = null;

            const msg = await sendMessage(chatId, `✅ اسکرول ${sign > 0 ? 'پایین' : 'بالا'} به اندازه ${amount}px`);
            state.tempMessageIds.push(msg?.data?.message_id);
            await updateScreenshot(page, chatId);
          }

          async function handleSelectionInput(page, chatId, numberText) {
            const state = getState(chatId);
            const num = parseInt(numberText);
            if (isNaN(num) || num <= 0) {
              const msg = await sendMessage(chatId, '❌ لطفاً یک عدد معتبر وارد کنید.');
              state.tempMessageIds.push(msg?.data?.message_id);
              return;
            }
            const clicked = await clickByNumber(page, num);
            if (!clicked) {
              const msg = await sendMessage(chatId, `❌ عنصری با شماره ${num} یافت نشد.`);
              state.tempMessageIds.push(msg?.data?.message_id);
              return;
            }
            await removeHighlights(page);
            state.selectionMode = false;
            await sleep(500);
            await updateScreenshot(page, chatId);
            log(`✅ کلیک روی عنصر شماره ${num} موفق`);
          }

          async function handleSearchInput(page, chatId, query) {
            const state = getState(chatId);
            if (!query || query.length < 2) {
              const msg = await sendMessage(chatId, '❌ لطفاً حداقل ۲ حرف وارد کنید.');
              state.tempMessageIds.push(msg?.data?.message_id);
              return;
            }

            const results = await searchByText(page, query);
            if (results.length === 0) {
              const msg = await sendMessage(chatId, `🔎 هیچ عنصری با "${query}" یافت نشد.`);
              state.tempMessageIds.push(msg?.data?.message_id);
              state.searchMode = false;
              return;
            }

            // ذخیره نتایج برای انتخاب بعدی
            state.searchResults = results;

            const list = results.map(r => `${r.index}. <${r.tag}> ${r.text}${r.id ? ' #'+r.id : ''}`).join('\n');
            const maxShow = Math.min(results.length, 15);
            const truncatedList = results.slice(0, maxShow).map(r => `${r.index}. <${r.tag}> ${r.text}${r.id ? ' #'+r.id : ''}`).join('\n');

            const msg = await sendMessage(chatId, `🔎 ${results.length} عنصر یافت شد${results.length > maxShow ? ` (نمایش ${maxShow} مورد اول)` : ''}:\n${truncatedList}\n\nشماره مورد نظر را وارد کنید.`);
            state.tempMessageIds.push(msg?.data?.message_id);
            // حالت searchMode باقی می‌ماند تا شماره دریافت شود
          }

          async function handleSearchSelection(page, chatId, numberText) {
            const state = getState(chatId);
            const num = parseInt(numberText);
            if (isNaN(num) || num <= 0 || num > state.searchResults.length) {
              const msg = await sendMessage(chatId, '❌ شماره نامعتبر. لطفاً یک شماره از لیست وارد کنید.');
              state.tempMessageIds.push(msg?.data?.message_id);
              return;
            }

            const clicked = await clickBySearchIndex(page, num - 1); // searchResults ایندکس صفر دارد
            if (!clicked) {
              const msg = await sendMessage(chatId, `❌ کلیک روی عنصر ${num} ناموفق بود.`);
              state.tempMessageIds.push(msg?.data?.message_id);
            } else {
              log(`✅ کلیک روی عنصر جستجو شماره ${num} موفق`);
            }

            state.searchMode = false;
            state.searchResults = [];
            await sleep(500);
            await updateScreenshot(page, chatId);
          }

          // ======================== اجرای اصلی ========================
          (async () => {
            try {
              const me = await api('getMe');
              const bot = me?.data?.bot;
              if (!bot?.username) { err('توکن نامعتبر'); process.exit(1); }
              log('✅ ربات:', bot.username);

              const proxies = fs.readFileSync('proxies.txt', 'utf8')
                .split('\n').map(l => l.trim())
                .filter(l => /^(vless|trojan|ss|vmess):\/\//.test(l));
              log(`${proxies.length} پروکسی یافت شد.`);

              let xrayProc = null;
              for (let i = 0; i < proxies.length; i++) {
                const uri = proxies[i];
                log(`تست پروکسی ${i+1}/${proxies.length}: ${uri.substring(0,70)}...`);
                xrayProc = await startXray(uri, i);
                if (!xrayProc) continue;
                if (!testCurl(10808)) { err('تست curl ناموفق'); xrayProc.kill(); continue; }
                log('✅ پروکسی سالم است.');
                break;
              }
              if (!xrayProc) { err('هیچ پروکسی سالمی یافت نشد'); process.exit(1); }

              const browser = await puppeteer.launch({
                headless: 'new',
                args: [
                  '--no-sandbox','--disable-setuid-sandbox',
                  '--proxy-server=socks5://127.0.0.1:10808',
                  '--disable-dev-shm-usage','--window-size=1280,720'
                ],
                defaultViewport: null
              });
              const page = await browser.newPage();
              await page.setViewport({ width: MAX_X, height: MAX_Y, deviceScaleFactor: 1 });
              await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/125.0.0.0');
              await injectFakeCursor(page);
              log('🌍 مرورگر آماده شد.');

              if (OWNER) await sendMessage(OWNER, '🟢 ربات روشن شد.');
              else log('⚠️ OWNER_CHAT_ID تنظیم نشده.');

              log('🧹 پاک‌سازی تاریخچه...');
              let offset = null;
              let flushed = 0;
              while (true) {
                const params = { limit: 10 };
                if (offset !== null) params.offset_id = offset;
                const upRes = await api('getUpdates', params);
                if (upRes.error) break;
                const updates = upRes?.data?.updates;
                if (!updates || updates.length === 0) break;
                flushed += updates.length;
                if (upRes.data?.next_offset_id) {
                  offset = upRes.data.next_offset_id;
                } else {
                  break;
                }
              }
              log(`✅ تاریخچه پاک شد (${flushed} آپدیت). offset: ${offset || 'ندارد'}`);

              await sleep(1000);
              log('🔁 حلقه دریافت پیام‌های جدید آغاز شد.');

              let consecutiveErrors = 0;
              const END_TIME = Date.now() + 17380 * 1000;

              while (Date.now() < END_TIME) {
                try {
                  const params = { limit: 10 };
                  if (offset !== null) params.offset_id = offset;
                  const upRes = await api('getUpdates', params);
                  if (upRes.error) {
                    consecutiveErrors++;
                    if (consecutiveErrors >= 3) { offset = null; consecutiveErrors = 0; }
                    await sleep(5000);
                    continue;
                  }
                  consecutiveErrors = 0;
                  const updates = upRes?.data?.updates;

                  if (updates?.length) {
                    for (const upd of updates) {
                      if (upd.type !== 'NewMessage') continue;
                      const chatId = upd.chat_id;
                      const msg = upd.new_message;
                      if (!msg) continue;

                      const state = getState(chatId);
                      const buttonId = msg.aux_data?.button_id;
                      const text = (msg.text || '').trim();

                      await deleteTempMessages(chatId);

                      if (buttonId) {
                        log(`🔘 دکمه ${buttonId} از ${chatId}`);
                        await handleButton(page, chatId, buttonId);
                      }
                      // اولویت با حالت‌های خاص
                      else if (state.searchMode && state.searchResults.length > 0) {
                        // اگر نتایج جستجو وجود دارد، عدد ورودی را به عنوان انتخاب تلقی کن
                        await handleSearchSelection(page, chatId, text);
                      }
                      else if (state.searchMode) {
                        // در غیر این صورت، متن ورودی را به عنوان کوئری جستجو پردازش کن
                        await handleSearchInput(page, chatId, text);
                      }
                      else if (state.selectionMode) {
                        await handleSelectionInput(page, chatId, text);
                      }
                      else if (state.scrollMode) {
                        await handleScrollInput(page, chatId, text);
                      }
                      else if (state.moveMode) {
                        await handleMoveInput(page, chatId, text);
                      }
                      else if (state.typingMode) {
                        state.typingMode = false;
                        if (text) {
                          log(`⌨️ تایپ "${text}" در ${chatId}`);
                          await injectFakeCursor(page);
                          await page.keyboard.type(text, { delay: 50 });
                          await sleep(300);
                          await updateScreenshot(page, chatId);
                        }
                      }
                      else if (state.urlMode) {
                        state.urlMode = false;
                        if (text) {
                          log(`🌐 رفتن به ${text} از ${chatId}`);
                          try {
                            await page.goto(text, { waitUntil: 'networkidle2', timeout: 30000 });
                            state.cursorX = 0; state.cursorY = 0;
                            await sleep(2000);
                            await updateScreenshot(page, chatId);
                          } catch (e) {
                            err('بارگذاری ناموفق:', e.message);
                            await sendMessage(chatId, `❌ خطا در باز کردن آدرس: ${e.message}`);
                          }
                        }
                      }
                      else if (text === '/start') {
                        await sendMessage(chatId, '🟢 ربات آماده است. از دکمه‌ها استفاده کنید.');
                        if (!state.lastScreenshotMsgId) {
                          await updateScreenshot(page, chatId);
                        }
                      } else if (text === 'help') {
                        await sendMessage(chatId, '🎮 دکمه‌ها:\n⬆️⬇️⬅️➡️ حرکت (سپس عدد)\n🏠 وسط\n⬆️⬇️ اسکرول (سپس عدد)\n🖱️ کلیک/دبل/راست\n⌨️ تایپ\n🌐 آدرس جدید\n🔍 انتخاب با شماره\n🔎 جستجوی متن\n↵ Enter\n📸 اسکرین‌شات');
                      }
                    }
                    if (upRes.data?.next_offset_id) offset = upRes.data.next_offset_id;
                  }
                } catch(e) {
                  err('خطای حلقه اصلی:', e.message);
                  await sleep(5000);
                }
                await sleep(4000);
              }

              log('⏰ خاموشی خودکار.');
              await browser.close();
              xrayProc.kill();
              if (OWNER) await sendMessage(OWNER, '⏹️ ربات خاموش شد.');
            } catch(fatalError) {
              err('🚨 خطای مرگبار:', fatalError.message);
              console.error(fatalError);
              process.exit(1);
            }
          })();
          ENDSCRIPT

