name: 📸 Groq Playground Snapshot Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  groq-check:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write

    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🧰 نصب ابزارها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y curl unzip
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d xray && chmod +x xray/xray
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
          mkdir -p groq_screenshots

      - name: 🤖 اجرای اسکرین‌شات‌گیر از Groq Playground
        run: |
          cat > agent.cjs << 'ENDSCRIPT'
          const { spawn } = require('child_process');
          const fs = require('fs');
          const path = require('path');
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());

          const SCREENSHOT_DIR = 'groq_screenshots';
          const TARGET_URL = 'https://console.groq.com/playground';
          const TIMEOUT_PAGE_LOAD = 45000;  // ۴۵ ثانیه صبر برای لود کامل

          function ts() { return new Date().toISOString().replace('T',' ').substring(0,19); }
          function log(...args) { console.log(`[${ts()}]`, ...args); }
          function err(...args) { console.error(`[${ts()}] ❌`, ...args); }

          // =============== Xray Helpers ===============
          function parseURI(uri) {
            try {
              const u = new URL(uri);
              return {
                protocol: u.protocol.replace(':',''),
                uuid: u.username,
                address: u.hostname,
                port: u.port,
                params: Object.fromEntries(u.searchParams.entries())
              };
            } catch(e) { return null; }
          }

          function generateXrayConfig(uri) {
            const p = parseURI(uri);
            if (!p) return null;
            const inbound = { port: 10808, protocol: 'socks', settings: { auth: 'noauth', udp: true } };
            let outbound = {
              protocol: p.protocol,
              settings: p.protocol === 'trojan' ? {
                servers: [{ address: p.address, port: parseInt(p.port), password: p.uuid }]
              } : {
                vnext: [{ address: p.address, port: parseInt(p.port), users: [{ id: p.uuid, encryption: p.params.encryption || 'none', flow: p.params.flow || '' }] }]
              },
              streamSettings: { network: p.params.type || 'tcp' }
            };
            const network = p.params.type || 'tcp';
            outbound.streamSettings.network = network;
            if (network === 'ws') {
              outbound.streamSettings.wsSettings = {
                path: p.params.path || '/',
                headers: p.params.host ? { Host: p.params.host } : {}
              };
            }
            const security = p.params.security || 'none';
            if (security === 'tls' || security === 'reality') {
              outbound.streamSettings.security = security;
              const tls = { serverName: p.params.sni || p.address };
              if (security === 'reality') {
                tls.fingerprint = p.params.fp || 'chrome';
                tls.publicKey = p.params.pbk || '';
                tls.shortId = p.params.sid || '';
                tls.spiderX = '';
              }
              if (p.params.allowInsecure === '1') tls.allowInsecure = true;
              if (p.params.alpn) tls.alpn = p.params.alpn.split(',');
              outbound.streamSettings.tlsSettings = tls;
            } else {
              outbound.streamSettings.security = 'none';
            }
            return { inbounds: [inbound], outbounds: [outbound] };
          }

          async function startXray(uri, idx) {
            const config = generateXrayConfig(uri);
            if (!config) return null;
            const cfgPath = `/tmp/xray_${idx}.json`;
            fs.writeFileSync(cfgPath, JSON.stringify(config, null, 2));
            const xray = spawn(path.join(process.cwd(), 'xray', 'xray'), ['run', '-config', cfgPath], { stdio: 'pipe' });
            await new Promise(r => setTimeout(r, 4000));
            return xray;
          }

          function testCurl(port, url) {
            try {
              require('child_process').execSync(
                `curl --socks5 127.0.0.1:${port} --max-time 8 -s -o /dev/null -w "%{http_code}" ${url}`,
                { encoding: 'utf8', stdio: 'pipe', timeout: 12000 }
              );
              return true;
            } catch(e) {
              return false;
            }
          }

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // =============== اسکرین‌شات از Groq ===============
          async function takeGroqScreenshot(uri, proxyIndex) {
            const xrayProc = await startXray(uri, proxyIndex);
            if (!xrayProc) return false;

            // تست سریع با curl (به خود سایت Groq)
            if (!testCurl(10808, 'https://console.groq.com')) {
              log('پروکسی در تست curl به groq.com رد شد.');
              xrayProc.kill();
              return false;
            }

            let browser;
            try {
              browser = await puppeteer.launch({
                headless: 'new',
                args: [
                  '--no-sandbox',
                  '--disable-setuid-sandbox',
                  '--proxy-server=socks5://127.0.0.1:10808',
                  '--disable-dev-shm-usage',
                  '--window-size=1280,720'
                ],
                defaultViewport: null
              });

              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 720, deviceScaleFactor: 1 });
              await page.setUserAgent(
                'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36'
              );

              log(`🌐 در حال بارگذاری ${TARGET_URL} ...`);
              await page.goto(TARGET_URL, {
                waitUntil: 'networkidle2',
                timeout: TIMEOUT_PAGE_LOAD
              });
              await sleep(2000); // کمی صبر برای انیمیشن‌ها

              // تشخیص اینکه واقعاً وارد Playground شدیم یا نه
              const pageTitle = await page.title();
              const bodyText = await page.evaluate(() => document.body.innerText.substring(0, 200));

              // اگر صفحه شامل "Playground" یا "Groq" یا فرم چت باشد، موفق محسوب می‌شود
              if (
                pageTitle.includes('Groq') ||
                bodyText.includes('Playground') ||
                bodyText.includes('console.groq.com')
              ) {
                const screenshotPath = path.join(SCREENSHOT_DIR, `proxy_${proxyIndex + 1}.png`);
                await page.screenshot({ path: screenshotPath, fullPage: false });
                log(`📸 اسکرین‌شات ذخیره شد: ${screenshotPath}`);
                await browser.close();
                xrayProc.kill();
                return true;
              } else {
                log('صفحه لود شد ولی محتوای مورد انتظار دیده نشد.');
                // در هر حال عکس می‌گیریم (برای بررسی بعدی)
                const screenshotPath = path.join(SCREENSHOT_DIR, `proxy_${proxyIndex + 1}_failed.png`);
                await page.screenshot({ path: screenshotPath, fullPage: false });
                log(`⚠️ اسکرین‌شات مشکوک ذخیره شد: ${screenshotPath}`);
                await browser.close();
                xrayProc.kill();
                return false;
              }
            } catch (e) {
              err('خطا در بارگذاری صفحه:', e.message);
              try {
                // سعی می‌کنیم عکس صفحه خطا را هم بگیریم
                if (browser && page) {
                  const screenshotPath = path.join(SCREENSHOT_DIR, `proxy_${proxyIndex + 1}_error.png`);
                  await page.screenshot({ path: screenshotPath, fullPage: false });
                  log(`🆘 اسکرین‌شات خطا ذخیره شد: ${screenshotPath}`);
                }
              } catch(_) {}
              try { await browser.close(); } catch(_) {}
              xrayProc.kill();
              return false;
            }
          }

          // =============== روند اصلی ===============
          (async () => {
            if (!fs.existsSync('proxies.txt')) {
              err('فایل proxies.txt پیدا نشد.');
              process.exit(1);
            }

            const proxies = fs.readFileSync('proxies.txt', 'utf8')
              .split('\n')
              .map(l => l.trim())
              .filter(l => l.startsWith('vless://') || l.startsWith('trojan://') || l.startsWith('ss://') || l.startsWith('vmess://'));

            log(`تعداد ${proxies.length} پروکسی برای بررسی بارگذاری شد.`);

            let successCount = 0;
            for (let i = 0; i < proxies.length; i++) {
              const uri = proxies[i];
              log(`\n--- تست ${i+1}/${proxies.length} ---`);
              log(`پروکسی: ${uri.substring(0, 80)}...`);

              const ok = await takeGroqScreenshot(uri, i);
              if (ok) {
                log('✅ اسکرین‌شات با موفقیت گرفته شد.');
                successCount++;
              } else {
                log('❌ اسکرین‌شات نگرفتیم یا صفحه مشکل داشت.');
              }

              await sleep(2000); // فاصله کوتاه
            }

            log(`\n🎉 پایان. اسکرین‌شات‌های موفق: ${successCount}/${proxies.length}`);
            process.exit(0);
          })();
          ENDSCRIPT

          timeout 17400 node agent.cjs

      - name: 📤 ارسال اسکرین‌شات‌ها به ریپو
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add groq_screenshots/
          git commit -m "📸 بروزرسانی اسکرین‌شات‌های Groq Playground - $(date +'%Y-%m-%d %H:%M')" || echo "بدون تغییر"
          git push
