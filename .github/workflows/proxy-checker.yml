نام: 🔍 بررسی پروکسی‌های یوتیوب

on:
  workflow_dispatch:

jobs:
  check-proxies:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: 📥 دریافت مخزن
        uses: actions/checkout@v4

      - name: 🧰 نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y curl unzip
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d xray && chmod +x xray/xray
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: 🔍 اجرای تست پروکسی‌ها
        run: |
          cat > proxy_checker.cjs << 'ENDSCRIPT'
          const { spawn, execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());

          const INPUT_FILE = 'proxies.txt';
          const OUTPUT_FILE = 'کانفیگ های خوب.txt';
          const YOUTUBE_URL = 'https://www.youtube.com/';

          function log(...args) { console.log(`[${new Date().toISOString().substring(0,19)}]`, ...args); }
          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // ======================== Xray ========================
          function parseURI(uri) {
            try {
              const u = new URL(uri);
              return {
                protocol: u.protocol.replace(':',''),
                uuid: u.username,
                address: u.hostname,
                port: u.port,
                params: Object.fromEntries(u.searchParams.entries())
              };
            } catch(_) { return null; }
          }
          function generateXrayConfig(uri) {
            const p = parseURI(uri); if (!p) return null;
            const inbound = { port: 10808, protocol: 'socks', settings: { auth: 'noauth', udp: true } };
            let outbound = {
              protocol: p.protocol,
              streamSettings: { network: p.params.type || 'tcp' }
            };
            if (p.protocol === 'trojan') {
              outbound.settings = {
                servers: [{ address: p.address, port: parseInt(p.port), password: p.uuid }]
              };
            } else {
              outbound.settings = {
                vnext: [{
                  address: p.address,
                  port: parseInt(p.port),
                  users: [{ id: p.uuid, encryption: p.params.encryption || 'none', flow: p.params.flow || '' }]
                }]
              };
            }
            const network = p.params.type || 'tcp';
            outbound.streamSettings.network = network;
            if (network === 'ws') {
              outbound.streamSettings.wsSettings = {
                path: p.params.path || '/',
                headers: p.params.host ? { Host: p.params.host } : {}
              };
            }
            const security = p.params.security || 'none';
            if (security === 'tls' || security === 'reality') {
              outbound.streamSettings.security = security;
              const tls = { serverName: p.params.sni || p.address };
              if (security === 'reality') {
                tls.fingerprint = p.params.fp || 'chrome';
                tls.publicKey = p.params.pbk || '';
                tls.shortId = p.params.sid || '';
                tls.spiderX = '';
              }
              if (p.params.allowInsecure === '1') tls.allowInsecure = true;
              if (p.params.alpn) tls.alpn = p.params.alpn.split(',');
              outbound.streamSettings.tlsSettings = tls;
            } else {
              outbound.streamSettings.security = 'none';
            }
            return { inbounds: [inbound], outbounds: [outbound] };
          }
          async function startXray(uri, idx) {
            const config = generateXrayConfig(uri); if (!config) return null;
            const cfgPath = `/tmp/xray_${idx}.json`;
            fs.writeFileSync(cfgPath, JSON.stringify(config, null, 2));
            const proc = spawn(path.join(process.cwd(), 'xray', 'xray'), ['run', '-config', cfgPath], { stdio: 'pipe' });
            await new Promise(r => setTimeout(r, 4000));
            return proc;
          }

          async function testProxyWithYouTube(uri) {
            let xrayProc = null;
            let browser = null;
            try {
              xrayProc = await startXray(uri, Date.now());
              if (!xrayProc) return false;
              // تست ابتدایی با curl
              try {
                execSync('curl --socks5 127.0.0.1:10808 --max-time 5 -s http://ip-api.com/json', { encoding:'utf8' });
              } catch(e) {
                return false;
              }

              browser = await puppeteer.launch({
                headless: 'new',
                args: [
                  '--no-sandbox','--disable-setuid-sandbox',
                  '--proxy-server=socks5://127.0.0.1:10808',
                  '--disable-dev-shm-usage','--window-size=1280,720'
                ]
              });
              const page = await browser.newPage();
              await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/125.0.0.0');
              await page.goto(YOUTUBE_URL, { waitUntil: 'networkidle2', timeout: 30000 });
              await sleep(4000);
              const bodyText = await page.evaluate(() => document.body.innerText.toLowerCase());
              const blocked = ['access denied', 'you have been blocked', 'cloudflare', 'attention required'].some(t => bodyText.includes(t));
              return !blocked;
            } catch(e) {
              log(`⚠️ خطا در تست پروکسی: ${e.message}`);
              return false;
            } finally {
              if (browser) await browser.close().catch(()=>{});
              if (xrayProc) { xrayProc.kill(); await sleep(500); }
            }
          }

          (async () => {
            // خواندن پروکسی‌های جدید از proxies.txt
            if (!fs.existsSync(INPUT_FILE)) {
              log(`❌ فایل ${INPUT_FILE} یافت نشد.`);
              process.exit(1);
            }
            const newProxies = fs.readFileSync(INPUT_FILE, 'utf8')
              .split('\n').map(l => l.trim())
              .filter(l => /^(vless|trojan|ss|vmess):\/\//.test(l));
            log(`📋 ${newProxies.length} پروکسی جدید برای بررسی یافت شد.`);

            // خواندن پروکسی‌های خوب فعلی
            let goodProxies = [];
            if (fs.existsSync(OUTPUT_FILE)) {
              goodProxies = fs.readFileSync(OUTPUT_FILE, 'utf8')
                .split('\n').map(l => l.trim())
                .filter(l => /^(vless|trojan|ss|vmess):\/\//.test(l));
              log(`✅ ${goodProxies.length} پروکسی از قبل در فایل خوب‌ها وجود دارد.`);
            }

            const added = [];
            for (const proxy of newProxies) {
              // بررسی تکراری نبودن
              if (goodProxies.includes(proxy)) {
                log(`⏭️ پروکسی تکراری، رد شد: ${proxy.substring(0,60)}...`);
                continue;
              }
              log(`🔍 تست پروکسی: ${proxy.substring(0,60)}...`);
              const ok = await testProxyWithYouTube(proxy);
              if (ok) {
                log(`✅ پروکسی خوب است.`);
                goodProxies.push(proxy);
                added.push(proxy);
              } else {
                log(`❌ پروکسی ناموفق.`);
              }
            }

            if (added.length > 0) {
              // اضافه کردن به فایل (با حفظ خط‌های خالی مناسب)
              const currentContent = fs.existsSync(OUTPUT_FILE) ? fs.readFileSync(OUTPUT_FILE, 'utf8') : '';
              // اگر فایل خالی یا بدون خط جدید تمام می‌شود، یک خط خالی اضافه کن
              const separator = currentContent.endsWith('\n') ? '' : '\n';
              const newLines = added.map(p => p + '\n').join('');
              fs.appendFileSync(OUTPUT_FILE, separator + newLines);
              log(`📤 ${added.length} پروکسی جدید به ${OUTPUT_FILE} اضافه شد.`);
            } else {
              log(`ℹ️ هیچ پروکسی جدیدی اضافه نشد.`);
            }
          })();
          ENDSCRIPT

          timeout 1800 node proxy_checker.cjs

      - name: 📤 ذخیره‌سازی تغییرات در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'کانفیگ های خوب.txt'
          git commit -m "📡 به‌روزرسانی پروکسی‌های خوب" || echo "تغییری برای ثبت وجود ندارد"
          git push
