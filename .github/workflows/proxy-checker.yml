name: 🎬 ربات یوتیوب (پیشرفته با فیلتر و پروکسی تصادفی)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🧰 نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y curl unzip python3-pip ffmpeg
          pip install yt-dlp
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d xray && chmod +x xray/xray
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: 🤖 اجرای ربات هوشمند
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
        run: |
          cat > agent.cjs << 'ENDSCRIPT'
          const { spawn, execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());

          const PROXY_FILE = 'کانفیگ های خوب.txt';
          const COOKIE_FILE = '/tmp/youtube_cookies.txt';
          const TOKEN = process.env.RUBIKA_BOT_TOKEN;
          if (!TOKEN) { console.error('❌ RUBIKA_BOT_TOKEN تنظیم نشده'); process.exit(1); }

          const MAX_DURATION = 5400;          // ۱.۵ ساعت
          const MAX_ESTIMATED_SIZE = 600 * 1024 * 1024; // ۶۰۰ مگابایت
          const MAX_PROXY_RETRIES = 3;        // حداکثر تعویض پروکسی برای یک درخواست
          const MAX_QUEUE = 200;

          let proxies = [];
          const queue = [];
          let isProcessing = false;
          const recentTimes = [];
          let currentProxy = null;    // پروکسی که الان فعال است
          let xrayProc = null;

          function ts() { return new Date().toISOString().replace('T',' ').substring(0,19); }
          function log(...args) { console.log(`[${ts()}]`, ...args); }
          function err(...args) { console.error(`[${ts()}] ❌`, ...args); }
          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // ======================== Xray ========================
          function parseURI(uri) {
            try {
              const u = new URL(uri);
              return { protocol: u.protocol.replace(':',''), uuid: u.username, address: u.hostname, port: u.port, params: Object.fromEntries(u.searchParams.entries()) };
            } catch(_) { return null; }
          }
          function generateXrayConfig(uri) {
            const p = parseURI(uri); if (!p) return null;
            const inbound = { port: 10808, protocol: 'socks', settings: { auth: 'noauth', udp: true } };
            let outbound = { protocol: p.protocol, streamSettings: { network: p.params.type || 'tcp' } };
            if (p.protocol === 'trojan') outbound.settings = { servers: [{ address: p.address, port: parseInt(p.port), password: p.uuid }] };
            else outbound.settings = { vnext: [{ address: p.address, port: parseInt(p.port), users: [{ id: p.uuid, encryption: p.params.encryption || 'none', flow: p.params.flow || '' }] }] };
            const net = p.params.type || 'tcp'; outbound.streamSettings.network = net;
            if (net === 'ws') outbound.streamSettings.wsSettings = { path: p.params.path || '/', headers: p.params.host ? { Host: p.params.host } : {} };
            const sec = p.params.security || 'none';
            if (sec === 'tls' || sec === 'reality') {
              outbound.streamSettings.security = sec;
              const tls = { serverName: p.params.sni || p.address };
              if (sec === 'reality') { tls.fingerprint = p.params.fp || 'chrome'; tls.publicKey = p.params.pbk || ''; tls.shortId = p.params.sid || ''; tls.spiderX = ''; }
              if (p.params.allowInsecure === '1') tls.allowInsecure = true;
              if (p.params.alpn) tls.alpn = p.params.alpn.split(',');
              outbound.streamSettings.tlsSettings = tls;
            } else outbound.streamSettings.security = 'none';
            return { inbounds: [inbound], outbounds: [outbound] };
          }
          async function startXray(uri, idx) {
            const config = generateXrayConfig(uri); if (!config) return null;
            const cfgPath = `/tmp/xray_${idx}.json`;
            fs.writeFileSync(cfgPath, JSON.stringify(config, null, 2));
            const proc = spawn(path.join(process.cwd(), 'xray', 'xray'), ['run', '-config', cfgPath], { stdio: 'pipe' });
            await sleep(4000);
            return proc;
          }
          function testCurl() {
            try { execSync('curl --socks5 127.0.0.1:10808 --max-time 5 -s http://ip-api.com/json', { encoding:'utf8' }); return true; }
            catch(_) { return false; }
          }

          // ======================== Rubika API ========================
          const BASE = `https://botapi.rubika.ir/v3/${TOKEN}`;
          async function api(method, body={}, retries=3) {
            const url = `${BASE}/${method}`;
            for (let a=0; a<retries; a++) {
              try {
                const ctrl = new AbortController(); const id = setTimeout(()=>ctrl.abort(),30000);
                const res = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:ctrl.signal});
                clearTimeout(id);
                const t = await res.text();
                let d; try { d = JSON.parse(t); } catch(_) { if (a<retries-1) { await sleep(2000*(a+1)); continue; } return {error:true, raw:t}; }
                return d;
              } catch(e) { if (a<retries-1) { await sleep(2000*(a+1)); continue; } return {error:true, message:e.message}; }
            }
          }
          async function sendMessage(chatId, text, keypad = null) {
            const body = { chat_id: chatId, text };
            if (keypad) {
              body.chat_keypad = keypad;
              body.chat_keypad_type = 'New';
            }
            return await api('sendMessage', body);
          }
          async function uploadAndSendVideo(chatId, videoPath, caption='') {
            const start = Date.now();
            const req = await api('requestSendFile', {type:'Video'});
            const upUrl = req?.data?.upload_url;
            if (!upUrl) { err('upload_url نگرفت'); return false; }
            const buf = fs.readFileSync(videoPath);
            const form = new FormData();
            form.append('file', new Blob([buf], {type:'application/octet-stream'}), path.basename(videoPath));
            const upRes = await fetch(upUrl, {method:'POST', body:form});
            const upText = await upRes.text();
            let j = {}; try { j = JSON.parse(upText); } catch(_){}
            const fileId = j?.file_id || j?.data?.file_id;
            if (!fileId) { err('file_id یافت نشد'); return false; }
            const s = await api('sendFile', {chat_id:chatId, file_id:fileId, text:caption});
            const elapsed = ((Date.now()-start)/1000).toFixed(1);
            log(`⬆️ آپلود ${path.basename(videoPath)} در ${elapsed}s`);
            return !!s?.data?.message_id;
          }

          // ======================== کوکی یوتیوب با پروکسی فعلی ========================
          async function grabCookies() {
            if (!currentProxy) return false;
            let browser;
            try {
              browser = await puppeteer.launch({ headless:'new', args:['--no-sandbox','--disable-setuid-sandbox','--proxy-server=socks5://127.0.0.1:10808','--disable-dev-shm-usage'] });
              const page = await browser.newPage();
              await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/125.0.0.0');
              await page.goto('https://www.youtube.com/', { waitUntil:'networkidle2', timeout:60000 });
              await sleep(5000);
              const cookies = await page.cookies();
              await browser.close();
              if (cookies.length===0) return false;
              const lines = ['# Netscape HTTP Cookie File', ''];
              cookies.forEach(c => {
                const domain = c.domain.startsWith('.') ? c.domain : '.' + c.domain;
                const flag = c.secure ? 'TRUE' : 'FALSE';
                const exp = c.expires>0 ? Math.floor(c.expires) : 0;
                lines.push(`${domain}\tTRUE\t${c.path}\t${flag}\t${exp}\t${c.name}\t${c.value}`);
              });
              fs.writeFileSync(COOKIE_FILE, lines.join('\n'));
              log('🍪 کوکی جدید دریافت شد');
              return true;
            } catch(e) { err('خطای کوکی:', e.message); if (browser) await browser.close().catch(()=>{}); return false; }
          }

          // ======================== انتخاب تصادفی پروکسی و فعال‌سازی ========================
          function getRandomProxy() {
            if (proxies.length === 0) return null;
            const idx = Math.floor(Math.random() * proxies.length);
            return proxies[idx];
          }

          async function switchToRandomProxy() {
            // خاموش کردن پروکسی فعلی
            if (xrayProc) { xrayProc.kill(); await sleep(500); xrayProc = null; }
            currentProxy = null;

            for (let attempt = 0; attempt < proxies.length; attempt++) {
              const candidate = getRandomProxy();
              log(`🔀 تلاش با پروکسی تصادفی: ${candidate.substring(0,60)}...`);
              xrayProc = await startXray(candidate, Date.now());
              await sleep(4000);
              if (testCurl()) {
                currentProxy = candidate;
                return true;
              } else {
                if (xrayProc) { xrayProc.kill(); await sleep(500); xrayProc = null; }
              }
            }
            return false;
          }

          // ======================== بررسی حجم و زمان ویدیو (فیلتر) ========================
          async function checkVideoEligibility(url) {
            try {
              const info = execSync(
                `yt-dlp --cookies ${COOKIE_FILE} --proxy socks5h://127.0.0.1:10808 --no-playlist --dump-json "${url}"`,
                { encoding: 'utf8', timeout: 30000 }
              );
              const data = JSON.parse(info);
              const duration = data.duration || 0;
              const filesizeApprox = data.filesize_approx || data.filesize || 0;

              if (duration > MAX_DURATION) {
                const min = Math.floor(duration / 60);
                return { ok: false, reason: `مدت ویدیو (${min} دقیقه) بیش از ۹۰ دقیقه مجاز است.` };
              }
              if (filesizeApprox > MAX_ESTIMATED_SIZE) {
                const mb = (filesizeApprox / (1024*1024)).toFixed(0);
                return { ok: false, reason: `حجم تخمینی ویدیو (≈${mb}MB) بیش از ۶۰۰MB مجاز است.` };
              }
              return { ok: true };
            } catch(e) {
              // اگر نشد اطلاعات گرفت، ریسک می‌کنیم و اجازه می‌دهیم
              log('⚠️ نشد اطلاعات ویدیو چک شود، ادامه می‌دهیم...');
              return { ok: true };
            }
          }

          // ======================== دانلود ویدیو با کوکی فعلی ========================
          async function downloadYouTube(url) {
            const out = '/tmp/video_raw.mp4';
            const fmt = `best[height<=480][ext=mp4] / best[height<=480]`;
            const start = Date.now();
            try {
              execSync(
                `yt-dlp --cookies ${COOKIE_FILE} --proxy socks5h://127.0.0.1:10808 ` +
                `-N 16 --concurrent-fragments 16 --buffer-size 2048K --no-playlist ` +
                `--format "${fmt}" --merge-output-format mp4 --output "${out}" ` +
                `"${url}"`,
                {stdio:'inherit', timeout:600000}
              );
              const t = ((Date.now()-start)/1000).toFixed(1);
              log(`⬇️ دانلود در ${t}s`);
              if (!fs.existsSync(out)) return null;
              return { path: out, time: parseFloat(t) };
            } catch(e) { err('دانلود شکست:', e.message); return null; }
          }

          // ======================== تبدیل سریع (ظرف کپی) ========================
          async function makeCompatible(inputPath) {
            const probeExt = execSync(`ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of csv=p=0 "${inputPath}"`, {encoding:'utf8'}).trim();
            const audioExt = execSync(`ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of csv=p=0 "${inputPath}"`, {encoding:'utf8'}).trim();
            const ext = path.extname(inputPath).toLowerCase();
            if (ext === '.mp4' && probeExt==='h264' && audioExt==='aac') return inputPath;
            log('🔄 تبدیل ظرف (فقط کپی) به MP4 سازگار...');
            const out = inputPath.replace(/\.\w+$/, '_ok.mp4');
            execSync(`ffmpeg -i "${inputPath}" -c copy -movflags +faststart "${out}"`, {stdio:'inherit', timeout:300000});
            return out;
          }

          // ======================== تقسیم‌کنندهٔ پویا (بر اساس بیت‌ریت) ========================
          async function splitAndSend(chatId, videoPath, baseName) {
            const stats = fs.statSync(videoPath);
            const sizeMB = (stats.size / (1024 * 1024)).toFixed(1);
            log(`✂️ شروع تقسیم ${baseName} (${sizeMB}MB)`);
            await sendMessage(chatId, `📦 ویدیو ${sizeMB}MB است. در حال تقسیم هوشمند...`);

            const duration = parseFloat(
              execSync(`ffprobe -v error -show_entries format=duration -of csv=p=0 "${videoPath}"`, { encoding: 'utf8' }).trim()
            );
            const bitrate = parseFloat(
              execSync(`ffprobe -v error -show_entries format=bit_rate -of csv=p=0 "${videoPath}"`, { encoding: 'utf8' }).trim()
            );
            const maxChunkSizeBytes = 45 * 1024 * 1024;
            let segmentTime = Math.floor((maxChunkSizeBytes * 8) / bitrate);
            segmentTime = Math.min(600, Math.max(30, segmentTime));
            log(`🎯 بیت‌ریت: ${(bitrate/1000).toFixed(0)}kbps | مدت: ${duration.toFixed(1)}s | زمان قطعه: ${segmentTime}s`);

            if (duration <= segmentTime + 10) {
              await sendMessage(chatId, `📤 ویدیو زیر ۵۰MB، مستقیم ارسال می‌شود.`);
              return await uploadAndSendVideo(chatId, videoPath, `🎬 ${baseName}.mp4`);
            }

            const chunkDir = `/tmp/chunks_${Date.now()}`;
            fs.mkdirSync(chunkDir, { recursive: true });
            const pattern = path.join(chunkDir, 'part_%03d.mp4');
            execSync(`ffmpeg -i "${videoPath}" -c copy -f segment -segment_time ${segmentTime} -reset_timestamps 1 "${pattern}"`, { stdio: 'inherit', timeout: 600000 });

            const chunks = fs.readdirSync(chunkDir).filter(f => f.endsWith('.mp4')).sort((a,b) => {
              const na = parseInt(a.match(/\d+/)[0]), nb = parseInt(b.match(/\d+/)[0]);
              return na - nb;
            });
            if (chunks.length===0) { fs.rmSync(chunkDir, {recursive:true}); return false; }

            const total = chunks.length;
            let totalUpTime = 0;
            for (let i=0; i<chunks.length; i++) {
              const chunkName = chunks[i];
              const chunkPath = path.join(chunkDir, chunkName);
              const chunkSize = (fs.statSync(chunkPath).size/(1024*1024)).toFixed(1);
              const newName = `${baseName}.part${String(i+1).padStart(2,'0')}.mp4`;
              const finalPath = path.join(chunkDir, newName);
              fs.renameSync(chunkPath, finalPath);

              const startUp = Date.now();
              const ok = await uploadAndSendVideo(chatId, finalPath,
                (i===total-1 ? `🎬 قسمت آخر ${baseName}` : `📦 ${newName} (${chunkSize}MB)`));
              const upTime = ((Date.now()-startUp)/1000).toFixed(1);
              totalUpTime += parseFloat(upTime);
              log(`📤 قطعه ${i+1}/${total}: ${newName} آپلود در ${upTime}s`);
              await sendMessage(chatId, `📤 قطعه ${i+1}/${total} ارسال شد (${upTime}s) — ${chunkSize}MB`);
              try { fs.unlinkSync(finalPath); } catch(_){}
              await sleep(500);
            }
            fs.rmSync(chunkDir, {recursive:true});
            log(`مجموع زمان آپلود قطعات: ${totalUpTime.toFixed(1)}s`);
            return true;
          }

          // ======================== صف و پردازش هوشمند ========================
          function getAverageTime() {
            if (recentTimes.length === 0) return 90;
            return recentTimes.reduce((a,b)=>a+b, 0) / recentTimes.length;
          }

          async function processRequest(chatId, url) {
            const startAll = Date.now();
            let success = false;
            try {
              // تأخیر تصادفی ۱-۵ ثانیه برای طبیعی‌سازی
              const delay = Math.floor(Math.random() * 4000) + 1000;
              await sleep(delay);

              // تلاش با پروکسی‌های تصادفی تا MAX_PROXY_RETRIES بار
              let dlResult = null;
              for (let attempt = 0; attempt < MAX_PROXY_RETRIES; attempt++) {
                if (attempt > 0) {
                  log(`🔄 تلاش مجدد (${attempt+1}/${MAX_PROXY_RETRIES})...`);
                  await sendMessage(chatId, `🔄 تعویض پروکسی و تلاش مجدد (${attempt+1}/${MAX_PROXY_RETRIES})...`);
                  if (!(await switchToRandomProxy())) {
                    await sendMessage(chatId, '❌ هیچ پروکسی در دسترس نیست.');
                    return;
                  }
                  if (!(await grabCookies())) continue;
                }

                dlResult = await downloadYouTube(url);
                if (dlResult) break;
                else log('❌ دانلود با این پروکسی ناموفق');
              }

              if (!dlResult) {
                await sendMessage(chatId, '❌ بعد از چندین تلاش دانلود ممکن نشد.');
                return;
              }

              let videoPath = dlResult.path;
              const dlTime = dlResult.time;

              const compatPath = await makeCompatible(videoPath);
              if (compatPath !== videoPath) {
                try { fs.unlinkSync(videoPath); } catch(_){}
                videoPath = compatPath;
              }

              const finalSize = fs.statSync(videoPath).size;
              const finalMB = (finalSize/(1024*1024)).toFixed(1);
              await sendMessage(chatId, `✅ دانلود شد | حجم: ${finalMB}MB | زمان: ${dlTime}s`);

              if (finalSize <= 50*1024*1024) {
                const sent = await uploadAndSendVideo(chatId, videoPath, `🎬 ${path.basename(videoPath)}`);
                if (sent) await sendMessage(chatId, '📤 ویدیو با موفقیت ارسال شد.');
                else await sendMessage(chatId, '❌ ارسال ناموفق.');
              } else {
                const splitStart = Date.now();
                const baseName = path.basename(videoPath, path.extname(videoPath));
                const ok = await splitAndSend(chatId, videoPath, baseName);
                if (ok) {
                  const totalSplit = ((Date.now()-splitStart)/1000).toFixed(1);
                  await sendMessage(chatId, `⏱️ کل زمان تقسیم و ارسال: ${totalSplit}s`);
                } else {
                  await sendMessage(chatId, '❌ تقسیم ویدیو ناموفق بود.');
                }
              }
              try { fs.unlinkSync(videoPath); } catch(_){}
              success = true;
            } catch(e) {
              err('خطای غیرمنتظره در پردازش:', e.message);
              await sendMessage(chatId, '❌ خطایی رخ داد.');
            } finally {
              const totalTime = (Date.now() - startAll) / 1000;
              if (success) {
                recentTimes.push(totalTime);
                if (recentTimes.length > 5) recentTimes.shift();
              }
              // تغییر پروکسی بعد از هر کار (تصادفی جدید)
              await switchToRandomProxy();
              await grabCookies();
              processNext();
            }
          }

          async function processNext() {
            if (queue.length === 0) {
              isProcessing = false;
              return;
            }
            isProcessing = true;
            const next = queue.shift();
            await sendMessage(next.chatId, '🔜 نوبت شما رسید! در حال دانلود...');
            processRequest(next.chatId, next.url);
          }

          function addToQueue(chatId, url) {
            if (queue.some(item => item.chatId === chatId)) {
              sendMessage(chatId, '⚠️ شما قبلاً یک درخواست در صف دارید. لطفاً صبر کنید.');
              return;
            }
            if (!isProcessing) {
              isProcessing = true;
              sendMessage(chatId, '📥 شروع دانلود...');
              processRequest(chatId, url);
              return;
            }
            if (queue.length >= MAX_QUEUE) {
              sendMessage(chatId, '⚠️ ظرفیت صف تکمیل است. لطفاً بعداً تلاش کنید.');
              return;
            }
            queue.push({ chatId, url });
            const position = queue.length;
            const avg = getAverageTime();
            const estMin = Math.ceil((position * avg) / 60);
            const keypad = {
              rows: [
                { buttons: [ { id: 'QUEUE_STATUS', type: 'Simple', button_text: '⏳ چقدر مونده؟' } ] }
              ],
              resize_keyboard: true,
              one_time_keyboard: false
            };
            sendMessage(chatId, `🔢 شما نفر ${position} در صف هستید.\n⏱️ زمان انتظار تقریبی: ${estMin} دقیقه`, keypad);
          }

          async function handleQueueStatus(chatId) {
            const idx = queue.findIndex(item => item.chatId === chatId);
            if (idx === -1) {
              await sendMessage(chatId, 'ℹ️ درخواست فعالی برای شما یافت نشد.');
              return;
            }
            const position = idx + 1;
            const avg = getAverageTime();
            const estSec = Math.ceil(position * avg);
            const estMin = Math.floor(estSec / 60);
            const estRemSec = estSec % 60;
            let timeText = estMin > 0 ? `${estMin} دقیقه و ${estRemSec} ثانیه` : `${estSec} ثانیه`;
            await sendMessage(chatId, `📍 شما نفر ${position} در صف هستید.\n⏳ حدوداً ${timeText} دیگر نوبت شماست.`);
          }

          // ======================== اجرای اصلی ========================
          (async () => {
            const me = await api('getMe');
            if (!me?.data?.bot?.username) { err('توکن نامعتبر'); process.exit(1); }
            log('✅ ربات:', me.data.bot.username);

            proxies = fs.readFileSync(PROXY_FILE, 'utf8').split('\n').map(l=>l.trim()).filter(l=>/^(vless|trojan|ss|vmess):\/\//.test(l));
            if (proxies.length === 0) { err('هیچ پروکسی در فایل نیست'); process.exit(1); }
            log(`${proxies.length} پروکسی خوب`);

            if (!(await switchToRandomProxy())) { err('❌ هیچ پروکسی اولیه‌ای سالم نبود'); process.exit(1); }
            if (!(await grabCookies())) { err('❌ کوکی اولیه شکست'); process.exit(1); }

            log('🧹 پاکسازی پیام‌های قدیمی...');
            let offset = null;
            while (true) {
              const res = await api('getUpdates', { limit: 10, offset_id: offset });
              const updates = res?.data?.updates;
              if (!updates || updates.length === 0) break;
              offset = res.data.next_offset_id;
              if (!offset) break;
            }
            log('✅ تاریخچه پاک شد');

            const sentHelp = new Set();
            const DEADLINE = Date.now() + 17380*1000;

            while (Date.now() < DEADLINE) {
              try {
                const res = await api('getUpdates', { limit: 10, offset_id: offset });
                if (res.error) { log('⚠️ خطا در getUpdates:', res.message || res.raw); await sleep(5000); continue; }
                const updates = res?.data?.updates;
                if (!updates || updates.length === 0) {
                  await sleep(4000);
                  continue;
                }

                for (const u of updates) {
                  if (u.type !== 'NewMessage') continue;
                  const chatId = u.chat_id;
                  const msg = u.new_message;
                  const buttonId = msg.aux_data?.button_id;

                  if (buttonId === 'QUEUE_STATUS') {
                    await handleQueueStatus(chatId);
                    continue;
                  }

                  if (!msg?.text) continue;
                  const text = msg.text.trim();

                  const ytReg = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/;
                  const m = text.match(ytReg);
                  if (!m) {
                    if (!sentHelp.has(chatId)) {
                      await sendMessage(chatId, '👋 سلام! لینک یوتیوب رو بفرست تا دانلود کنم.');
                      sentHelp.add(chatId);
                    }
                    continue;
                  }

                  const videoUrl = m[0];
                  log(`🎬 درخواست از ${chatId}: ${videoUrl}`);

                  // فیلتر حجم/زمان
                  const eligibility = await checkVideoEligibility(videoUrl);
                  if (!eligibility.ok) {
                    await sendMessage(chatId, `⚠️ ${eligibility.reason}`);
                    continue;
                  }

                  addToQueue(chatId, videoUrl);
                }

                if (res.data?.next_offset_id) offset = res.data.next_offset_id;
              } catch(e) {
                err('حلقه اصلی:', e.message);
                await sleep(5000);
              }
            }

            if (xrayProc) xrayProc.kill();
            log('⏹️ ربات خاموش شد');
          })();
          ENDSCRIPT

