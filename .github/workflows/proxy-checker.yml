name: 🧪 تست سرعت دانلود مستقیم با کوکی

on:
  workflow_dispatch:

jobs:
  test-cookie-direct:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 دریافت کد و فایل کوکی
        uses: actions/checkout@v4

      - name: 🛠️ نصب yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip ffmpeg
          pip install yt-dlp

      - name: 🚀 دانلود مستقیم و اندازه‌گیری سرعت
        run: |
          echo "==========================================="
          echo "🎯 شروع دانلود مستقیم (بدون پروکسی)"
          echo "🎬 ویدیو: https://www.youtube.com/watch?v=esJOOQG42r0"
          echo "🍪 فقط با فایل youtube_cookies.txt"
          echo "==========================================="
          
          # پاک‌سازی هرگونه تنظیمات پروکسی در محیط
          unset http_proxy
          unset https_proxy
          unset all_proxy
          unset HTTP_PROXY
          unset HTTPS_PROXY
          unset ALL_PROXY
          
          # اندازه‌گیری زمان و دانلود
          time yt-dlp \
            --cookies youtube_cookies.txt \
            --no-playlist \
            --format "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            --merge-output-format mp4 \
            --output "/tmp/test_video.mp4" \
            "https://www.youtube.com/watch?v=esJOOQG42r0"

      - name: 📊 بررسی نتیجه
        run: |
          echo "==========================================="
          echo "📁 فایل دانلود شده:"
          ls -lh /tmp/test_video.mp4 2>/dev/null || echo "❌ فایل وجود ندارد – دانلود ناموفق بود"
          echo "==========================================="
          echo "🔎 سرعت و زمان دقیق در خطوط بالا (از خروجی yt-dlp و time) قابل مشاهده است."
